    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hilangkan Scrollbar secara visual tapi tetap bisa di-scroll */
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Swipe container utility */
        .swipe-item {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Prevent system pull-to-refresh & overshoot scrolling for App */
        html, body {
            overscroll-behavior-y: contain;
            height: 100%;
            overflow: hidden;
        }

        /* --- PENGATURAN KHUSUS UNTUK CETAK PDF (PRINT MEDIA) --- */
        @media print {
            html, body {
                height: auto !important; /* Biarkan tinggi menyesuaikan konten agar tidak terpotong 1 halaman */
                overflow: visible !important;
                background-color: white !important;
            }
            #print-section {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            @page {
                margin: 1.5cm; /* Margin standar kertas PDF */
            }
        }
    </style>

</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 flex flex-col transition-colors duration-200">

    <!-- MAIN APP CONTROLLER -->
    <script>
        // --- KODE UTALITAS GLOBAL KEYPAD VIRTUAL & KALKULATOR UNIVERSAL (FINAL SINKRON) ---
        // Menggunakan window object agar aman dan tidak merusak state internal data aplikasi
        window.activeKeypadInputId = window.activeKeypadInputId || null;

        // Fungsi untuk memformat angka bersih menjadi string ber-titik ribuan
        function formatRibuan(angkaStr) {
            if (!angkaStr || angkaStr === "0") return "";
            let nomor = angkaStr.replace(/[^0-9]/g, '');
            return nomor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        // Fungsi pembantu untuk memformat seluruh angka di dalam ekspresi matematika kustom
        function formatEkspresi(ekspresi) {
            return ekspresi.replace(/([0-9]+)/g, function(match) {
                return formatRibuan(match);
            });
        }

        // FUNGSI UTAMA: Memicu munculnya keypad kustom sesuai dengan ID konteks elemen input target
        function triggerKeypadShow(inputId) {
            window.activeKeypadInputId = inputId;
            
            const keypads = document.querySelectorAll('#custom-keypad');
            const keypad = keypads.length > 0 ? keypads[keypads.length - 1] : null;
            const inputEl = document.getElementById(inputId);

            if (!keypad || !inputEl) return;

            // Paksa sinkronisasi bentuk teks/ikon tombol aksi sebelum keypad tampil ke layar
            updateKeypadActionTemplate(inputEl.value, inputId);

            if (keypad.classList.contains('hidden')) {
                keypad.classList.remove('hidden');
                setTimeout(() => {
                    keypad.classList.remove('translate-y-full');
                    keypad.classList.add('translate-y-0');
                    inputEl.focus();
                    let len = inputEl.value.length;
                    inputEl.setSelectionRange(len, len);
                }, 10);
            } else {
                inputEl.focus();
            }
        }

        // FUNGSI UTAMA: Mengubah teks/gaya tombol enter secara akurat dan real-time sesuai target input
        function updateKeypadActionTemplate(currentValue, forcedTargetId = null) {
            // FIX MUTLAK: Cari tombol aksi yang berada di dalam keypad yang paling atas/aktif saat ini (Mencegah salah target ID duplikat)
            const keypads = document.querySelectorAll('#custom-keypad');
            const activeKeypad = keypads.length > 0 ? keypads[keypads.length - 1] : null;
            if (!activeKeypad) return;

            const btnAction = activeKeypad.querySelector('#keypad-btn-action');
            if (!btnAction) return;

            // Dahulukan parameter bawaan, kuncian global, baru fallback ke activeElement
            const targetId = forcedTargetId || window.activeKeypadInputId || (document.activeElement ? document.activeElement.id : null);

            // 1. KONDISI UNTUK MENU KALKULATOR PECAHAN UANG
            if (targetId && targetId.startsWith('denom-input-')) {
                if (targetId === 'denom-input-500') {
                    btnAction.innerHTML = '✓';
                    btnAction.className = "py-3 text-white font-black text-xl bg-emerald-600 rounded-xl active:bg-emerald-500 flex items-center justify-center";
                } else {
                    btnAction.innerHTML = '➔';
                    btnAction.className = "py-3 text-white font-black text-xl bg-blue-600 rounded-xl active:bg-blue-500 flex items-center justify-center";
                }
                return;
            }

            // 2. KONDISI UNTUK KUSTOM FREKUENSI BERULANG (HARI, MINGGU, BULAN MUTLAK WAJIB PANAH)
            const freqOrder = ['freq-days', 'freq-weeks', 'freq-months', 'rec-repeat-limit'];
            if (targetId && freqOrder.includes(targetId)) {
                if (targetId === 'rec-repeat-limit') {
                    // Jika berada di input paling akhir (Total Ulang), ubah tombol menjadi CENTANG (✓) selesai
                    btnAction.innerHTML = '✓';
                    btnAction.className = "py-3 text-white font-black text-xl bg-emerald-600 rounded-xl active:bg-emerald-500 flex items-center justify-center";
                } else {
                    // Hari, Minggu, dan Bulan dipaksa mutlak menjadi tombol BERIKUTNYA (➔)
                    btnAction.innerHTML = '➔';
                    btnAction.className = "py-3 text-white font-black text-xl bg-blue-600 rounded-xl active:bg-blue-500 flex items-center justify-center";
                }
                return;
            }

            // 3. KONDISI UMUM DENGAN FUNGSI KALKULATOR AKTIF (TOMBOL SAMA DENGAN)
            if (/[\+\-\*\/]/.test(currentValue)) {
                btnAction.innerHTML = '=';
                btnAction.className = "py-3 text-white font-black text-xl bg-orange-500 rounded-xl active:bg-orange-400 flex items-center justify-center";
            } else {
                btnAction.innerHTML = '✓';
                btnAction.className = "py-3 text-white font-black text-xl bg-emerald-600 rounded-xl active:bg-emerald-500 flex items-center justify-center";
            }
        }

        // FUNGSI UTAMA: Memproses pengetikan dan kalkulasi matematika dari tombol keypad virtual
        function pressKey(key) {
            const targetId = window.activeKeypadInputId || (document.activeElement ? document.activeElement.id : null);
            const inputEl = document.getElementById(targetId);
            if (!inputEl) return;

            const idNonUang = ['freq-days', 'freq-weeks', 'freq-months', 'rec-repeat-limit'];
            const isPecahan = inputEl.id.startsWith('denom-input-');
            const isTipeUang = !idNonUang.includes(inputEl.id) && !isPecahan;

            let currentVal = inputEl.value;
            let murniVal = currentVal.replace(/\./g, ''); 

            if (key === 'done') {
                const keypads = document.querySelectorAll('#custom-keypad');
                const keypad = keypads.length > 0 ? keypads[keypads.length - 1] : null;

                // JIKA SEDANG SEBAGAI SAMA DENGAN (=) -> JALANKAN PROSES EVALUASI MATEMATIKA
                if (/[\+\-\*\/]/.test(murniVal)) {
                    try {
                        let rumusPembersihan = murniVal.replace(/[\+\-\*\/]+$/, '');
                        if (rumusPembersihan === "") {
                            inputEl.value = "";
                            updateKeypadActionTemplate("", targetId);
                            return;
                        }
                        
                        let hasilHitung = new Function(`return Math.round(${rumusPembersihan})`)();
                        let hasilStr = String(hasilHitung < 0 ? 0 : hasilHitung);

                        inputEl.value = isTipeUang ? formatRibuan(hasilStr) : hasilStr;

                        if (isPecahan) {
                            let pecahanVal = parseInt(inputEl.id.replace('denom-input-', ''));
                            handleDenomChange(pecahanVal, hasilStr);
                        }
                    } catch (e) {
                        console.error("Kesalahan Kalkulator:", e);
                    }
                    updateKeypadActionTemplate(inputEl.value, targetId);
                    inputEl.focus();
                    let len = inputEl.value.length;
                    inputEl.setSelectionRange(len, len);
                    return;
                }

                // LOGIKA ALUR RANTAI OTOMATIS: TOMBOL BERIKUTNYA (➔) UNTUK KALKULATOR PECAHAN UANG
                if (isPecahan && inputEl.id !== 'denom-input-500') {
                    const denomsOrder = ['100000', '75000', '50000', '20000', '10000', '5000', '2000', '1000', '500'];
                    let currentPecahanStr = inputEl.id.replace('denom-input-', '');
                    let currentIndex = denomsOrder.indexOf(currentPecahanStr);
                    
                    if (currentIndex !== -1 && currentIndex < denomsOrder.length - 1) {
                        let nextPecahanId = 'denom-input-' + denomsOrder[currentIndex + 1];
                        triggerKeypadShow(nextPecahanId);
                        return;
                    }
                }

                // ALUR RANTAI NAVIGASI FULL: HARI ➔ MINGGU ➔ BULAN ➔ TOTAL ULANG KALIKAN tanpa terputus
                const freqOrder = ['freq-days', 'freq-weeks', 'freq-months', 'rec-repeat-limit'];
                if (freqOrder.includes(inputEl.id) && inputEl.id !== 'rec-repeat-limit') {
                    let currentIndex = freqOrder.indexOf(inputEl.id);
                    if (currentIndex !== -1 && currentIndex < freqOrder.length - 1) {
                        let nextFreqId = freqOrder[currentIndex + 1];
                        window.activeKeypadInputId = nextFreqId;
                        triggerKeypadShow(nextFreqId);
                        return;
                    }
                }

                // JIKA SEDANG SEBAGAI CENTANG (✓) -> SELESAI DAN TUTUP BOTTOM SHEET KEYPAD
                if (keypad && !keypad.classList.contains('hidden')) {
                    keypad.classList.remove('translate-y-0');
                    keypad.classList.add('translate-y-full');
                    inputEl.blur();
                    setTimeout(() => { keypad.classList.add('hidden'); }, 300);
                }
                window.activeKeypadInputId = null;
                return;
            }

            if (key === 'clear') {
                inputEl.value = "";
                updateKeypadActionTemplate("", targetId);
                if (isPecahan) {
                    let pecahanVal = parseInt(inputEl.id.replace('denom-input-', ''));
                    handleDenomChange(pecahanVal, "");
                }
                return;
            }

            if (key === 'backspace') {
                if (currentVal.length === 0) return;
                
                let potong = 1;
                if (currentVal.endsWith('.')) potong = 2;

                let newVal = currentVal.substring(0, currentVal.length - potong);
                let rawNewVal = newVal.replace(/\./g, '');

                inputEl.value = isTipeUang ? formatEkspresi(rawNewVal) : rawNewVal;
                updateKeypadActionTemplate(inputEl.value, targetId);

                if (isPecahan) {
                    let pecahanVal = parseInt(inputEl.id.replace('denom-input-', ''));
                    handleDenomChange(pecahanVal, rawNewVal);
                }
                return;
            }

            // PENANGANAN PENGETIKAN TOMBOL OPERATOR MATEMATIKA (+ , - , * , /)
            if (['+', '-', '*', '/'].includes(key)) {
                if (murniVal === "") return; 

                if (/[\+\-\*\/]$/.test(murniVal)) {
                    murniVal = murniVal.slice(0, -1);
                }
                murniVal += key;
                inputEl.value = isTipeUang ? formatEkspresi(murniVal) : murniVal;
                updateKeypadActionTemplate(inputEl.value, targetId);
                return;
            }

            // PENANGANAN PENGETIKAN NOMINAL ANGKA NORMAL & DESIMAL EXPRESSION
            murniVal += key;
            
            if (/^0+/.test(murniVal) && !murniVal.startsWith('0.') && murniVal.length > 1) {
                murniVal = murniVal.replace(/^0+/, '');
            }

            inputEl.value = isTipeUang ? formatEkspresi(murniVal) : murniVal;
            updateKeypadActionTemplate(inputEl.value, targetId);

            // Jalankan fungsi hitung pecahan secara real-time apabila target input pecahan aktif
            if (isPecahan) {
                let pecahanVal = parseInt(inputEl.id.replace('denom-input-', ''));
                handleDenomChange(pecahanVal, murniVal);
            }
            
            inputEl.focus();
            let len = inputEl.value.length;
            inputEl.setSelectionRange(len, len);
        }

        // LISTENER GLOBAL: Mendeteksi klik di area luar untuk menutup keypad secara aman tanpa merusak fokus kursor
        document.addEventListener('click', function(event) {
            const keypads = document.querySelectorAll('#custom-keypad');
            const keypad = keypads.length > 0 ? keypads[keypads.length - 1] : null;
            
            if (event.target.tagName === 'INPUT' && event.target.getAttribute('inputmode') === 'none') return;
            if (event.target.closest('.binary-keypad') || (keypad && keypad.contains(event.target))) return;

            if (keypad && !keypad.classList.contains('hidden')) {
                keypad.classList.remove('translate-y-0');
                keypad.classList.add('translate-y-full');
                if (document.activeElement) document.activeElement.blur();
                setTimeout(() => { 
                    keypad.classList.add('hidden'); 
                    window.activeKeypadInputId = null;
                }, 300);
            }
        });
    
        // --- DATA STATE STRUCTURE & SEEDS ---
        // State awal mutlak bersih sesuai permintaan pengguna
        const MOCK_CATEGORIES = [];
        const MOCK_SOURCES = [];
        const MOCK_ACCOUNTS = [{ id: 'acc-1', name: 'Utama', deletedAt: null }];

        // Core App State object
        let state = {
            accounts: [],
            activeAccountId: 'acc-1',
            currentMonth: new Date().getMonth() + 1,
            currentYear: new Date().getFullYear(),
            transactions: [],
            categories: [],
            sources: [],
            budgets: [],
            transfers: [],
            recurring: [],
            notes: [],
            folders: [], // <-- Tambahkan di sini agar otomatis terinisialisasi bersih
            actionLogs: [],
            trash: [],
            settings: {
                darkMode: 'light',
                rollover: false,
                hasSeenWelcome: false,
                ignoreBudgetPrompt: false
            }
        };

        // Enforce 2026 - 2030 limits
        if(state.currentYear < 2026) state.currentYear = 2026;
        if(state.currentYear > 2030) state.currentYear = 2030;

        // UI state variables
        let activeTab = 'home';
        let navigationStack = []; 
        let swipeStartX = 0;
        let swipeStartY = 0;
        let activeSwipedId = null; 

        // --- CORE UTILITY FUNCTIONS ---
        // Penyesuaian Zona Waktu (Selalu gunakan referensi waktu zona lokal/setempat)
        function getLocalYYYYMMDD(dateObj) {
            const pad = n => String(n).padStart(2, '0');
            return `${dateObj.getFullYear()}-${pad(dateObj.getMonth() + 1)}-${pad(dateObj.getDate())}`;
        }
        function getLocalHHMM(dateObj) {
            const pad = n => String(n).padStart(2, '0');
            return `${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}`;
        }

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(number);
        }

        function formatCompactRupiah(number) {
            const absNum = Math.abs(number);
            const format = (num, divisor, suffix) => {
                // 1. Bagi angka dan batasi maksimal 3 angka di belakang koma
                let value = (num / divisor).toFixed(3);
    
                // 2. Ubah kembali ke float untuk menghapus nol yang tidak perlu di belakang desimal
                // 3. Ubah ke string lalu ganti titik desimal (.) menjadi koma (,)
                let res = parseFloat(value).toString().replace('.', ',');
    
                return res + ' ' + suffix;
            };
            if (absNum >= 1e12) return format(number, 1e12, 'T');
            if (absNum >= 1e9) return format(number, 1e9, 'M');
            if (absNum >= 1e6) return format(number, 1e6, 'jt');
            if (absNum >= 1e3) return format(number, 1e3, 'rb');
            return number.toString();
        }

        function generateSourceColor() {
            const colors = ['#6366f1', '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#8b5cf6', '#06b6d4', '#14b8a6', '#f43f5e', '#a855f7', '#0ea5e9'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function logAction(actionMessage) {
            const now = new Date();
            const log = { id: 'log-' + Date.now() + Math.random().toString(36).substr(2, 4), action: actionMessage, timestamp: now.toISOString(), accountId: state.activeAccountId };
            state.actionLogs.unshift(log);
            const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
            state.actionLogs = state.actionLogs.filter(l => new Date(l.timestamp).getTime() > sevenDaysAgo);
            saveDataToLocalStorage();
        }

        // --- DYNAMIC BALANCE CALCULATION ENGINE ---
        function getBalancesAt(accountId, year, month) {
            const targetDate = new Date(year, month, 0, 23, 59, 59); 
            const targetIso = targetDate.toISOString();
            let balances = {};
            
            state.sources.forEach(s => {
                if (s.accountId === accountId && !s.deletedAt && s.createdAt <= targetIso) balances[s.id] = s.initialBalance || 0;
            });
            state.transactions.forEach(t => {
                if (t.accountId === accountId && !t.deletedAt && t.timestamp <= targetIso) {
                    if (balances[t.sourceId] !== undefined) {
                        if (t.type === 'income') balances[t.sourceId] += t.amount;
                        else balances[t.sourceId] -= t.amount;
                    }
                }
            });
            state.transfers.forEach(tr => {
                if (tr.accountId === accountId && tr.timestamp <= targetIso) {
                    if (balances[tr.fromSourceId] !== undefined) balances[tr.fromSourceId] -= tr.amount;
                    if (balances[tr.toSourceId] !== undefined) balances[tr.toSourceId] += tr.amount;
                }
            });
            return balances;
        }

        // --- LOCAL STORAGE MANAGER ---
        function saveDataToLocalStorage() { localStorage.setItem('fintrace_state', JSON.stringify(state)); }

        function loadDataFromLocalStorage() {
            const raw = localStorage.getItem('fintrace_state');
            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    state = { ...state, ...parsed };
                    
                    // Fallback for settings if they upgraded from an older version
                    if (state.settings.hasSeenWelcome === undefined) state.settings.hasSeenWelcome = true; // Assume true if old save exists
                    if (state.settings.ignoreBudgetPrompt === undefined) state.settings.ignoreBudgetPrompt = false;
                } catch(e) { seedInitialData(); }
            } else { seedInitialData(); }
            
            if (!state.currentYear || state.currentYear < 2026 || state.currentYear > 2030) {
                state.currentYear = new Date().getFullYear();
                if(state.currentYear < 2026) state.currentYear = 2026;
                if(state.currentYear > 2030) state.currentYear = 2030;
            }
            executeRolloverCheck();
            processRecurringTransactions();
            cleanupTrashOlderThan7Days();
        }

        function seedInitialData() {
            state.accounts = [...MOCK_ACCOUNTS];
            state.activeAccountId = 'acc-1';
            state.categories = [];
            state.sources = [];
            state.transactions = [];
            state.budgets = []; state.transfers = []; state.recurring = []; state.notes = [];
            state.actionLogs = [{ id: 'log-' + Date.now(), action: 'Inisialisasi aplikasi pertama kali.', timestamp: new Date().toISOString(), accountId: 'acc-1' }];
            state.trash = [];
            state.settings = { darkMode: 'light', rollover: false, hasSeenWelcome: false, ignoreBudgetPrompt: false };
            saveDataToLocalStorage();
        }

        // --- ROLLOVER AUTOMATISASI ---
        function executeRolloverCheck() {
            if (!state.settings.rollover) return;
            const now = new Date();
            const realMonth = now.getMonth() + 1; const realYear = now.getFullYear();
            const currentPeriod = `${realYear}-${String(realMonth).padStart(2,'0')}`;
            const key = `rollover_processed_${state.activeAccountId}_${currentPeriod}`;
            
            if (localStorage.getItem(key)) return; 

            let prevMonth = realMonth - 1; let prevYear = realYear;
            if (prevMonth === 0) { prevMonth = 12; prevYear--; }

            const prevBalances = getBalancesAt(state.activeAccountId, prevYear, prevMonth);
            let totalPrevBalance = 0;
            for(let srcId in prevBalances) totalPrevBalance += prevBalances[srcId];

            if (totalPrevBalance > 0) {
                const lastDayPrevMonth = new Date(prevYear, prevMonth, 0, 23, 59, 59);
                const isoTime = lastDayPrevMonth.toISOString();
                const dateStr = getLocalYYYYMMDD(lastDayPrevMonth); 

                let sysCat = state.categories.find(c => c.name === 'Sistem Rollover');
                if(!sysCat) {
                    sysCat = { id: 'cat-sys-roll', name: 'Sistem Rollover', type: 'expense', emoji: '⚙️', color: '#64748b', isCustom: true };
                    state.categories.push(sysCat);
                }

                for(let srcId in prevBalances) {
                    if (prevBalances[srcId] > 0) {
                        state.transactions.push({
                            id: 'tx-roll-out-' + Date.now() + Math.random().toString(36).substr(2, 4),
                            accountId: state.activeAccountId, type: 'expense', amount: prevBalances[srcId],
                            date: dateStr, timestamp: isoTime, categoryId: sysCat.id, sourceId: srcId, desc: 'Penyesuaian Sistem Rollover (Keluar)', recurringId: null, deletedAt: null
                        });
                    }
                }

                const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                const prevMonthName = monthNames[prevMonth - 1];
                const newSrcId = 'src-roll-' + Date.now();
                const firstDayCurrentMonth = new Date(realYear, realMonth - 1, 1, 0, 0, 1);

                state.sources.push({
                    id: newSrcId, name: `Saldo bulan ${prevMonthName} & tahun ${prevYear}`, initialBalance: totalPrevBalance, color: generateSourceColor(),
                    accountId: state.activeAccountId, createdAt: firstDayCurrentMonth.toISOString(), deletedAt: null
                });
                logAction(`Sistem Otomatis: Memindahkan sisa saldo bulan lalu ke bulan ini.`);
            }
            localStorage.setItem(key, 'true'); saveDataToLocalStorage();
        }

        function processRecurringTransactions() {
            const now = new Date();
            state.recurring.forEach(rec => {
                if (!rec.accountId || rec.accountId !== state.activeAccountId || rec.deletedAt) return;
                let nextRun = new Date(rec.nextRunDate); 
                let runLimit = rec.count; let actualRuns = rec.runCount || 0;

                while (nextRun <= now && actualRuns < runLimit) {
                    const txId = 'tx-rec-' + Date.now() + Math.random().toString(36).substr(2, 4);
                    const runIso = nextRun.toISOString();
                    const localDateStr = getLocalYYYYMMDD(nextRun);
                    
                    state.transactions.push({
                        id: txId, accountId: rec.accountId, type: rec.type, amount: rec.amount,
                        date: localDateStr, timestamp: runIso, categoryId: rec.categoryId, sourceId: rec.sourceId, desc: `[Berulang] ${rec.desc}`, recurringId: rec.id, deletedAt: null
                    });
                    actualRuns++;
                    const freq = rec.freq;
                    if (freq.days) nextRun.setDate(nextRun.getDate() + parseInt(freq.days));
                    if (freq.weeks) nextRun.setDate(nextRun.getDate() + parseInt(freq.weeks) * 7);
                    if (freq.months) nextRun.setMonth(nextRun.getMonth() + parseInt(freq.months));
                }
                rec.nextRunDate = nextRun.toISOString(); rec.runCount = actualRuns;
            });
            saveDataToLocalStorage();
        }

        function cleanupTrashOlderThan7Days() {
            const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
            state.trash = state.trash.filter(item => { return new Date(item.deletedAt).getTime() > sevenDaysAgo; });
            saveDataToLocalStorage();
        }

        function initSwipeGestures() {
            const el = document.getElementById('main-content');
            el.addEventListener('touchstart', (e) => { swipeStartX = e.touches[0].clientX; swipeStartY = e.touches[0].clientY; }, { passive: true });
            el.addEventListener('touchend', (e) => {
                const diffX = e.changedTouches[0].clientX - swipeStartX; const diffY = e.changedTouches[0].clientY - swipeStartY;
                if (e.target.closest('.no-swipe') || e.target.closest('input') || e.target.closest('textarea') || Math.abs(diffY) > Math.abs(diffX)) return;
                if (Math.abs(diffX) > 80) { 
                    const tabs = ['home', 'report', 'manage', 'more']; const curIndex = tabs.indexOf(activeTab);
                    if (diffX < 0 && curIndex < tabs.length - 1) switchTab(tabs[curIndex + 1]);
                    else if (diffX > 0 && curIndex > 0) switchTab(tabs[curIndex - 1]);
                }
            }, { passive: true });
        }

        function makeSwipable(elementId) {
            setTimeout(() => {
                const item = document.getElementById(elementId);
                if (!item) return;
                let startX = 0; 
                let startY = 0; 
                let isScrolling = undefined; // Untuk menandai apakah user sedang scroll atau swipe

                // Ambil kontainer induk tempat item dan tombol berada bersama
                const container = item.parentElement;

                // Fungsi untuk menutup swipe jika menyentuh area di luar kontainer bersama
                const closeOnOutsideTouch = (e) => {
                    // Jika komponen terbuka, dan area yang diklik berada di luar kontainer induk
                    if (activeSwipedId === elementId && container && !container.contains(e.target)) {
                        item.style.transform = `translateX(0px)`;
                        activeSwipedId = null;
                        document.removeEventListener('touchstart', closeOnOutsideTouch);
                    }
                };

                item.addEventListener('touchstart', (e) => {
                    e.stopPropagation(); 
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isScrolling = undefined; // Reset status setiap sentuhan baru

                    if (activeSwipedId && activeSwipedId !== elementId) {
                        const activeEl = document.getElementById(activeSwipedId);
                        if (activeEl) activeEl.style.transform = `translateX(0px)`;
                    }
                }, { passive: false }); // Ubah menjadi false agar bisa mengontrol event jika diperlukan

                item.addEventListener('touchmove', (e) => {
                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
            
                    const diffX = currentX - startX;
                    const diffY = currentY - startY;

                    // Tentukan arah gerakan di awal (apakah lebih dominan horizontal atau vertikal)
                    if (typeof isScrolling === 'undefined') {
                        isScrolling = Math.abs(diffY) > Math.abs(diffX);
                    }

                    // Jika user sedang scroll vertikal, abaikan fungsi swipe
                    if (isScrolling) {
                        return; 
                    }

                    // Jika user swipe horizontal, cegah halaman ikut ter-scroll
                    e.preventDefault(); 
                    e.stopPropagation();

                    if (diffX < 0) { 
                        let diff = Math.max(diffX, -100); 
                        item.style.transform = `translateX(${diff}px)`; 
                    } else { 
                        item.style.transform = `translateX(0px)`; 
                    }
                }, { passive: false }); // WAJIB false agar e.preventDefault() bisa bekerja

                item.addEventListener('touchend', (e) => {
                    // Jika sejak awal terdeteksi scroll, jangan lakukan apa-apa di touchend
                    if (isScrolling) return;

                    e.stopPropagation(); 
                    let diff = e.changedTouches[0].clientX - startX;
                    if (diff < -50) { 
                        item.style.transform = `translateX(-100px)`; 
                        activeSwipedId = elementId; 
                        
                        // Daftarkan listener global saat komponen berhasil terbuka
                        document.addEventListener('touchstart', closeOnOutsideTouch);
                    } else { 
                        item.style.transform = `translateX(0px)`; 
                        activeSwipedId = null; 
                    }
                }, { passive: true });
            }, 100);
        }

        function saveEditedAccountName(accId) {
            const newName = document.getElementById('edit-account-name').value.trim();
            if (!newName) { showToast("Kosong."); return; }
            const acc = state.accounts.find(a => a.id === accId);
            if (acc) { acc.name = newName; saveDataToLocalStorage(); logAction(`Ubah nama akun menjadi: ${newName}`); popNav(); openAccountSwitcher(); updateHeaderDetails(); showToast("Diubah."); }
        }

        function deleteAccount(accId) {
            const acc = state.accounts.find(a => a.id === accId);
            if (!acc) return;
            if (state.accounts.filter(a => !a.deletedAt).length <= 1) { showToast("Minimal sisa 1 akun."); return; }
            requestConfirm("Hapus Akun", `Yakin hapus akun "${acc.name}"? Data dipindah ke Sampah.`, () => {
                acc.deletedAt = new Date().toISOString();
                state.trash.push({ id: 'trash-' + Date.now(), type: 'account', refId: accId, name: acc.name, deletedAt: new Date().toISOString(), payload: JSON.stringify(acc), accountId: state.activeAccountId });
                if (state.activeAccountId === accId) state.activeAccountId = state.accounts.find(a => !a.deletedAt).id;
                saveDataToLocalStorage(); logAction(`Hapus akun: "${acc.name}".`); openAccountSwitcher(); updateHeaderDetails(); showToast("Dipindahkan.");
            });
        }

            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('header-date-label').textContent = `${monthNames[state.currentMonth - 1]} ${state.currentYear}`;
            const activeAcc = state.accounts.find(a => a.id === state.activeAccountId);
            if (activeAcc) document.getElementById('header-account-name').textContent = activeAcc.name;

            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
            const years = [2026, 2027, 2028, 2029, 2030];
            openModalPopup("Pilih Bulan & Tahun", () => {

            });

        function setAppMonth(m) { state.currentMonth = m; saveDataToLocalStorage(); updateHeaderDetails(); popNav(); renderActiveTabContent(); }
        function setAppYear(y) { state.currentYear = y; saveDataToLocalStorage(); updateHeaderDetails(); popNav(); renderActiveTabContent(); }

        let activeSearchTerm = "";
        let activeHistoryFilter = "all"; 

        function renderActiveTabContent() {

            if (activeTab === 'home') { content.innerHTML = renderHomeHTML(); initHomeJS(); }
            else if (activeTab === 'report') { content.innerHTML = renderReportHTML(); initReportJS(); }
            else if (activeTab === 'manage') { content.innerHTML = renderManageHTML(); }
            else if (activeTab === 'more') { 
                content.innerHTML = renderMoreHTML();

        }

        // 1. HOME TAB (BERANDA)
        // ==========================================

                            <p class="text-[9px] font-bold text-rose-50 tracking-wider uppercase">PENGELUARAN</p>

                            <div class="flex items-center gap-1.5">

        function initHomeJS() {
            const searchBtn = document.getElementById('history-search-btn');
            const searchBox = document.getElementById('search-input-box');
            const searchInput = document.getElementById('search-term-input'); // Ambil elemen input

            if (activeSearchTerm) searchBox.classList.remove('hidden');
    
            searchBtn.addEventListener('click', () => {
                searchBox.classList.toggle('hidden');
                if (!searchBox.classList.contains('hidden')) searchInput.focus();
            });

            // Fitur baru: Tutup keyboard saat tombol Enter ditekan
            if (searchInput) {
                searchInput.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        event.preventDefault(); // Mencegah aksi default enter (seperti submit form)
                        this.blur();            // Menghilangkan fokus dari input untuk menutup keyboard
                    }
                });
            }

            updateHomeTxListUI();
        }

        function handleHistorySearch(term) { activeSearchTerm = term; updateHomeTxListUI(); }
        function setHistoryFilter(filter) { activeHistoryFilter = filter; renderActiveTabContent(); }

        function updateHomeTxListUI() {
            const container = document.getElementById('tx-history-list-container');
            if(!container) return;

            const activeAccId = state.activeAccountId;
            const monthPrefix = `${state.currentYear}-${String(state.currentMonth).padStart(2, '0')}`;
            let filteredList = state.transactions.filter(t => t.accountId === activeAccId && t.date.startsWith(monthPrefix) && !t.deletedAt);

            if (activeHistoryFilter === 'income') filteredList = filteredList.filter(t => t.type === 'income');
            else if (activeHistoryFilter === 'expense') filteredList = filteredList.filter(t => t.type === 'expense');

            if (activeSearchTerm.trim() !== "") {
                const sTerm = activeSearchTerm.toLowerCase();
                filteredList = filteredList.filter(t => {
                    const catObj = state.categories.find(c => c.id === t.categoryId);
                    const srcObj = state.sources.find(s => s.id === t.sourceId);
                    return t.desc.toLowerCase().includes(sTerm) || t.amount.toString().includes(sTerm) ||
                           (catObj && catObj.name.toLowerCase().includes(sTerm)) ||
                           (srcObj && srcObj.name.toLowerCase().includes(sTerm));
                });
            }

            // Mengurutkan berdasarkan timestamp terbaru. 
            // Jika timestamp sama persis, urutkan berdasarkan ID secara mendalam (string comparison)
            filteredList.sort((a, b) => {
                const timeA = new Date(a.timestamp).getTime();
                const timeB = new Date(b.timestamp).getTime();
    
                if (timeB !== timeA) {
                    return timeB - timeA; // Urutkan dari waktu paling baru
                }
    
                // Jika waktu sama persis (hingga milidetik), urutkan berdasarkan ID secara alfabetis terbalik
                // (Asumsi: ID berupa string acak/unique hash, atau Auto-Increment seperti ID 2 > ID 1)
                return b.id.localeCompare(a.id);
            });

            const dailyTotals = {};
            filteredList.forEach(t => {
                if (!dailyTotals[t.date]) dailyTotals[t.date] = { income: 0, expense: 0 };
                if (t.type === 'income') dailyTotals[t.date].income += t.amount;
                else dailyTotals[t.date].expense += t.amount;
            });

            let html = "";
            if (filteredList.length === 0) { html = `<div class="p-8 text-center text-slate-500"><p class="text-xs">Tidak ada riwayat transaksi</p></div>`; } 
            else {
                let lastGroupDate = "";
                filteredList.forEach(t => {
                    const cat = state.categories.find(c => c.id === t.categoryId) || { name: 'Tak Berkategori', emoji: '🏷️', color: '#64748b' };
                    const src = state.sources.find(s => s.id === t.sourceId) || { name: 'Sumber Terhapus' };
                    
                    if (t.date !== lastGroupDate) {
                        lastGroupDate = t.date;
                        // Format Tanggal disesuaikan dengan array yang sudah menggunakan Timezone Lokal
                        const [y, m, d] = t.date.split('-');
                        const dObjLocal = new Date(y, m-1, d);
                        const formattedDate = dObjLocal.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                        
                        const dInc = dailyTotals[t.date].income;
                        const dExp = dailyTotals[t.date].expense;
                        let totalsArr = [];
                        if (dInc > 0) totalsArr.push(`<span class="text-emerald-500 font-bold">+${formatRupiah(dInc)}</span>`);
                        if (dExp > 0) totalsArr.push(`<span class="text-rose-500 font-bold">-${formatRupiah(dExp)}</span>`);

                        html += `
                            <div class="flex items-center justify-between border-t border-slate-200 dark:border-slate-800 text-[11px] font-extrabold text-slate-500 pt-2 px-2">
                                <span>${formattedDate}</span>
                                <div class="text-[10px] tracking-tight flex items-center">
                                    ${totalsArr.join('<span class="text-slate-200 dark:text-slate-800 mx-1">|</span>')}
                                </div>
                            </div>
                        `;
                    }
                    const tTime = new Date(t.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                    let iconContent = cat.emoji; if(cat.imageBase64) iconContent = `<img src="${cat.imageBase64}" class="w-full h-full object-cover rounded-xl">`;

                    html += `
                        <div class="relative overflow-hidden mb-1.5 rounded-0 border-0 border-slate-200 dark:border-slate-800 shadow-2xs">
                            <div id="tx-card-${t.id}" class="swipe-item relative flex items-center justify-between p-3 bg-slate-100 dark:bg-slate-950 z-10">
                                <div class="flex items-center gap-3 min-w-0">
                                    <div class="w-9 h-9 rounded-xl flex items-center justify-center text-lg shrink-0 overflow-hidden" style="background-color: ${cat.color}25; color: ${cat.color}">${iconContent}</div>
                                    <div class="min-w-0">
                                        <p class="font-bold text-xs text-slate-600 dark:text-slate-400 truncate">${t.desc || cat.name}</p>
                                        <span class="text-[9px] text-slate-500 font-medium flex items-center gap-1"><i data-lucide="wallet" class="w-2.5 h-2.5"></i> ${src.name} • ${tTime}</span>
                                    </div>
                                </div>
                                <div class="text-right shrink-0">
                                    <p class="font-extrabold text-xs ${t.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}">${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}</p>
                                    <p class="text-[8px] text-slate-500">${cat.name}</p>
                                </div>
                            </div>
                            <div class="absolute inset-y-0 right-0 flex items-center justify-end z-0">
                                <button onclick="editTransaction('${t.id}')" class="h-full w-12 bg-blue-500 text-white flex justify-center items-center"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteTransaction('${t.id}')" class="h-full w-12 bg-red-500 text-white flex justify-center items-center rounded-r-xl"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    `;
                    makeSwipable(`tx-card-${t.id}`);
                });
            }
            container.innerHTML = html; lucide.createIcons();
        }

        function showSourceBalanceDetail() {
            openModalPopup("Rincian Saldo Sumber Dana", () => {
                const activeAccId = state.activeAccountId;
                const balances = getBalancesAt(activeAccId, state.currentYear, state.currentMonth);
                let list = "";
                state.sources.forEach(s => {
                    if(s.accountId === activeAccId && balances[s.id] !== undefined && !s.deletedAt) {
                        list += `<div class="flex items-center justify-between py-2 text-slate-500 border-b border-slate-200 dark:border-slate-800 last:border-none"><span class="text-xs font-semibold flex items-center gap-1.5"><span class="w-2 h-2 rounded-full" style="background-color:${s.color||'#6366f1'}"></span> ${s.name}</span><span class="text-xs font-extrabold">${formatRupiah(balances[s.id])}</span></div>`;
                    }
                });
                return `<div class="space-y-1">${list || '<p class="text-xs text-center text-slate-500">Belum ada.</p>'}</div>`;
            });
        }

        function showComparisonPieChart() {
            openModalPopup("Selisih Pemasukan & Pengeluaran", () => {
                const monthPrefix = `${state.currentYear}-${String(state.currentMonth).padStart(2, '0')}`;
                const activeTxs = state.transactions.filter(t => t.accountId === state.activeAccountId && t.date.startsWith(monthPrefix) && !t.deletedAt);

                const totalIncome = activeTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                const totalExpense = activeTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
                const totalValue = totalIncome + totalExpense;

                let difference = totalIncome - totalExpense;
                let pctDiff = totalValue > 0 ? Math.round((Math.abs(difference) / totalValue) * 100) : 0;
                let strokeDash = "0, 100"; if (totalValue > 0) strokeDash = `${(totalIncome / totalValue) * 100}, 100`;

                return `
                    <div class="flex flex-col items-center justify-center p-2 text-center">
                        <div class="relative w-40 h-40 flex items-center justify-center">
                            <svg viewBox="0 0 36 36" class="w-full h-full transform rotate-90 scale-x-[-1] pointer-events-none">
                                <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#f43f5e" stroke-width="3"></circle>
                                <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#10b981" stroke-width="3" stroke-dasharray="${strokeDash}"></circle>
                            </svg>
                            <div class="absolute inset-0 flex flex-col items-center justify-center">
                                <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">SELISIH</span>
                                <span class="text-xs font-extrabold ${difference >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${formatRupiah(Math.abs(difference))}</span>
                                <span class="text-[9px] text-slate-500 font-semibold">${pctDiff}% dari total</span>
                            </div>
                        </div>
                        <div class="flex justify-center gap-4 mt-6 w-full text-[10px] text-slate-500">
                            <div class="flex items-center gap-1.5 font-bold"><span class="w-3 h-3 rounded-md bg-emerald-500 inline-block"></span><span>Masuk (${totalValue > 0 ? Math.round((totalIncome/totalValue)*100) : 0}%)</span></div>
                            <div class="flex items-center gap-1.5 font-bold"><span class="w-3 h-3 rounded-md bg-rose-500 inline-block"></span><span>Keluar (${totalValue > 0 ? Math.round((totalExpense/totalValue)*100) : 0}%)</span></div>
                        </div>
                    </div>
                `;
            });
        }

        // ==========================================
        // 2. REPORT TAB (LAPORAN)
        // ==========================================
        let analysisTargetType = 'expense'; 
        let analysisGroupType = 'category'; 
        let activeDateRangeOption = 'this_month'; 
        let activeCustomStartDate = ""; let activeCustomEndDate = "";
        let trendChartFilterMode = 'selisih'; 
        let analysisChartInstance = null; 

        function renderReportHTML() {
            let rangeLabelStr = "Bulan Ini";
            if(activeDateRangeOption === '7_days') rangeLabelStr = "7 Hari";
            if(activeDateRangeOption === '30_days') rangeLabelStr = "30 Hari";
            if(activeDateRangeOption === 'custom') rangeLabelStr = "Kustom";

            return `
                <div class="p-4 space-y-5">
                   <!-- Calendar Panel Section -->
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl shadow-xs">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-1">
                                <span class="text-xs font-extrabold text-slate-500">KALENDER PEMANTAU</span>
                                <button onclick="showHelpModal('report-calendar')" class="text-slate-500 hover:text-indigo-600"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i></button>
                            </div>
                            <span class="text-[9px] font-bold text-slate-500 uppercase">Aktivitas Bulanan</span>
                        </div>
                        <div id="calendar-grid-container"></div>
                    </div>

                    <!-- Charts Analysis Section -->
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl shadow-xs space-y-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-1">
                                <span class="text-xs font-extrabold text-slate-500">GRAFIK ANALISA</span>
                                <button onclick="showHelpModal('report-analysis')" class="text-slate-500 hover:text-indigo-600"><i data-lucide="help-circle" class="w-3.5 h-3.5"></i></button>
                            </div>
                            <button onclick="openDateRangeSelector()" class="flex items-center gap-1 px-2.5 py-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg text-[10px] font-bold text-indigo-600 dark:text-indigo-600">
                                <i data-lucide="calendar" class="w-3 h-3"></i>
                                <span id="report-range-label">${rangeLabelStr}</span>
                            </button>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 p-0.5 rounded-lg flex items-center">
                                <button onclick="toggleAnalysisTarget('income')" class="flex-1 py-1 text-[9px] font-bold rounded-md transition ${analysisTargetType==='income'?'bg-emerald-500 text-white shadow-xs':'text-slate-500'}">Masuk</button>
                                <button onclick="toggleAnalysisTarget('expense')" class="flex-1 py-1 text-[9px] font-bold rounded-md transition ${analysisTargetType==='expense'?'bg-rose-500 text-white shadow-xs':'text-slate-500'}">Keluar</button>
                            </div>
                            <div class="bg-slate-100 dark:bg-slate-950/50 border border-slate-200 dark:border-slate-800 p-0.5 rounded-lg flex items-center">
                                <button onclick="toggleAnalysisGroup('category')" class="flex-1 py-1 text-[9px] font-bold rounded-md transition ${analysisGroupType==='category'?'bg-indigo-600 text-white shadow-xs':'text-slate-500'}">Kategori</button>
                                <button onclick="toggleAnalysisGroup('source')" class="flex-1 py-1 text-[9px] font-bold rounded-md transition ${analysisGroupType==='source'?'bg-indigo-600 text-white shadow-xs':'text-slate-500'}">Sumber</button>
                            </div>
                        </div>

                        <div class="flex flex-col items-center justify-center py-2">

                                <button onclick="setTrendFilter('selisih')" class="px-2 py-1 rounded-md text-[9px] font-bold transition ${trendChartFilterMode==='selisih'?'bg-indigo-600 text-white shadow-xs':'text-slate-500'}">Selisih</button>
                                <button onclick="setTrendFilter('keluar')" class="px-2 py-1 rounded-md text-[9px] font-bold transition ${trendChartFilterMode==='keluar'?'bg-rose-500 text-white shadow-xs':'text-slate-500'}">Keluar</button>

        }

        function initReportJS() { renderCalendarGrid(); renderAnalysisGrafik(); renderTrendsChart(); renderAnnualSummaryChart(); }

        function renderCalendarGrid() {
            const container = document.getElementById('calendar-grid-container');
            if (!container) return;
            const year = state.currentYear; const month = state.currentMonth;
            const firstDayIndex = new Date(year, month - 1, 1).getDay(); const daysInMonth = new Date(year, month, 0).getDate();
            let startOffset = firstDayIndex - 1; if (startOffset < 0) startOffset = 6;

            let gridHtml = `<div class="grid grid-cols-7 gap-1 text-center font-bold text-[9px] text-slate-500 mb-2"><div>Sn</div><div>Sl</div><div>Rb</div><div>Km</div><div>Jm</div><div>Sb</div><div>Mg</div></div><div class="grid grid-cols-7 gap-1 text-center">`;
            for (let i = 0; i < startOffset; i++) gridHtml += `<div class="aspect-square"></div>`;

            const today = new Date(); const isCurrentRealMonth = today.getMonth() + 1 === month && today.getFullYear() === year;

            for (let day = 1; day <= daysInMonth; day++) {
                const dayStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTxs = state.transactions.filter(t => t.accountId === state.activeAccountId && t.date === dayStr && !t.deletedAt);
                const dayIncome = dayTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
                const dayExpense = dayTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);

                const isToday = isCurrentRealMonth && today.getDate() === day;
                let actLabel = "";
                if (dayIncome > 0) actLabel += `<p class="text-[6px] font-bold text-emerald-500 truncate">+${formatCompactRupiah(dayIncome)}</p>`;
                if (dayExpense > 0) actLabel += `<p class="text-[6px] font-bold text-rose-500 truncate">-${formatCompactRupiah(dayExpense)}</p>`;

                gridHtml += `
                    <button onclick="showCalendarDateTxs('${dayStr}')" class="aspect-square flex flex-col justify-between p-1 bg-slate-50 dark:bg-slate-950/50 rounded-lg text-left border ${isToday ? 'border-indigo-600' : 'border-slate-200 dark:border-slate-800'}">
                        <span class="text-[8px] font-extrabold ${isToday ? 'text-indigo-600 dark:text-indigo-600' : 'text-slate-500'}">${day}</span>
                        <div class="w-full truncate overflow-hidden">${actLabel}</div>
                    </button>
                `;
            }
            gridHtml += `</div>`; container.innerHTML = gridHtml;
        }

        function showCalendarDateTxs(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const dObjLocal = new Date(y, m-1, d);
            const fDate = dObjLocal.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            openModalPopup(`Transaksi ${fDate}`, () => {
                const dayTxs = state.transactions.filter(t => t.accountId === state.activeAccountId && t.date === dateStr && !t.deletedAt);
                dayTxs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                if (dayTxs.length === 0) return `<p class="text-xs text-center text-slate-500 py-4">Tidak ada.</p>`;
                let list = "";
                dayTxs.forEach(t => {
                    const cat = state.categories.find(c => c.id === t.categoryId) || { name: 'Umum', emoji: '🏷️' };
                    let ic = cat.emoji; if(cat.imageBase64) ic = `<img src="${cat.imageBase64}" class="w-6 h-6 object-cover rounded">`;
                    const tTime = new Date(t.timestamp).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
                    list += `<div class="flex items-center justify-between py-2 border-b border-slate-200 dark:border-slate-800 last:border-none"><div class="flex items-center gap-2"><span class="text-lg w-6 h-6 flex items-center justify-center">${ic}</span><div><p class="text-xs font-bold text-slate-500">${t.desc || cat.name}</p><span class="text-[9px] text-slate-500">${cat.name} • ${tTime}</span></div></div><span class="text-xs font-extrabold ${t.type === 'income' ? 'text-emerald-500' : 'text-rose-500'}">${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}</span></div>`;
                });
                return `<div class="space-y-1">${list}</div>`;
            });
        }

        function openDateRangeSelector() {
            openFullOverlay(() => {
                const opts = [{ id: 'this_month', label: 'Bulan Ini' }, { id: '7_days', label: '7 Hari' }, { id: '30_days', label: '30 Hari' }, { id: 'custom', label: 'Kustom' }];
                let lHtml = ""; opts.forEach(o => {
                    const sel = activeDateRangeOption === o.id;
                    lHtml += `<button onclick="setDateRangeOption('${o.id}')" class="w-full flex justify-between p-3.5 bg-white dark:bg-slate-900 border ${sel ? 'border-indigo-600' : 'border-slate-200 dark:border-slate-800'} rounded-xl text-left"><span class="text-xs font-bold ${sel ? 'text-indigo-600' : 'text-slate-500'}">${o.label}</span>${sel ? '<i data-lucide="check-circle" class="w-4 h-4 text-indigo-600"></i>' : ''}</button>`;
                });
                return `
                    <div class="p-4 space-y-4"><span class="text-xs font-semibold text-slate-500">RENTANG</span><div class="space-y-2">${lHtml}</div>
                        <div class="${activeDateRangeOption === 'custom' ? '' : 'hidden'} space-y-3 bg-white dark:bg-slate-900 p-4 border border-slate-200 dark:border-slate-800 rounded-xl">
                            <div class="grid grid-cols-2 gap-2"><div><label class="text-[8px] text-slate-500 font-bold">AWAL</label><input type="date" id="custom-start-date" value="${activeCustomStartDate}" class="w-full p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-500 font-bold rounded-lg border"></div><div><label class="text-[8px] text-slate-500 font-bold">AKHIR</label><input type="date" id="custom-end-date" value="${activeCustomEndDate}" class="w-full p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-500 font-bold rounded-lg border"></div></div>
                        </div>
                        <button onclick="applyDateRangeFilter()" class="w-full py-3 bg-indigo-600 text-white font-bold text-xs rounded-xl shadow-md">Terapkan</button>
                    </div>
                `;
            }, "Filter Rentang Tanggal", "overlay-daterangeselector");
        }
        function setDateRangeOption(optId) { activeDateRangeOption = optId; openDateRangeSelector(); }
        function applyDateRangeFilter() {
            if (activeDateRangeOption === 'custom') {
                const sDate = document.getElementById('custom-start-date').value; const eDate = document.getElementById('custom-end-date').value;
                if (!sDate || !eDate) { showToast("Tentukan tanggal awal & akhir."); return; }
                activeCustomStartDate = sDate; activeCustomEndDate = eDate;
            }
            popNav(); renderActiveTabContent();
        }

        function toggleAnalysisTarget(target) { analysisTargetType = target; renderActiveTabContent(); }
        function toggleAnalysisGroup(group) { analysisGroupType = group; renderActiveTabContent(); }
        function setTrendFilter(f) { trendChartFilterMode = f; renderActiveTabContent(); }

        function getFilteredAnalysisTxs() {
            const accId = state.activeAccountId; let start, end;
            if (activeDateRangeOption === 'this_month') {
                const prefix = `${state.currentYear}-${String(state.currentMonth).padStart(2, '0')}`;
                return state.transactions.filter(t => t.accountId === accId && t.date.startsWith(prefix) && t.type === analysisTargetType && !t.deletedAt);
            } else if (activeDateRangeOption === '7_days') { end = new Date(); start = new Date(); start.setDate(end.getDate() - 7);
            } else if (activeDateRangeOption === '30_days') { end = new Date(); start = new Date(); start.setDate(end.getDate() - 30);
            } else if (activeDateRangeOption === 'custom') { start = new Date(activeCustomStartDate); end = new Date(activeCustomEndDate); }
            
            return state.transactions.filter(t => { 
                const [y, m, d] = t.date.split('-');
                const txDateLocal = new Date(y, m-1, d);
                const compStart = new Date(start.getFullYear(), start.getMonth(), start.getDate(), 0, 0, 0);
                const compEnd = new Date(end.getFullYear(), end.getMonth(), end.getDate(), 23, 59, 59);
                return t.accountId === accId && t.type === analysisTargetType && txDateLocal >= compStart && txDateLocal <= compEnd && !t.deletedAt; 
            });
        }

        function renderAnalysisGrafik() {
            const donutContainer = document.getElementById('donut-chart-box'); 
            const listContainer = document.getElementById('report-breakdown-list');
            if (!donutContainer || !listContainer) return;

            const txs = getFilteredAnalysisTxs(); const grandTotal = txs.reduce((sum, t) => sum + t.amount, 0);
            const grouped = {}; txs.forEach(t => { const key = analysisGroupType === 'category' ? t.categoryId : t.sourceId; if (!grouped[key]) grouped[key] = 0; grouped[key] += t.amount; });

            const arr = [];
            Object.keys(grouped).forEach(key => {
                let n = "Lainnya", e = "🏷️", c = "#cbd5e1", img = null;
                if (analysisGroupType === 'category') { const cat = state.categories.find(x => x.id === key); if (cat) { n = cat.name; e = cat.emoji; c = cat.color; img = cat.imageBase64; } } 
                else { const src = state.sources.find(x => x.id === key); if (src) { n = src.name; e = "💰"; c = src.color || '#6366f1'; } }
                arr.push({ 
                    id: key, name: n, emoji: e, img:img, color: c, total: grouped[key], 
                    pct: grandTotal > 0 ? ((grouped[key] / grandTotal) * 100).toFixed(2) : "0.00"
                });
            });
            arr.sort((a, b) => b.total - a.total);

            if (grandTotal === 0) { 
                donutContainer.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center text-center p-4"><span class="text-[9px] text-slate-500 font-bold">Tidak ada data</span></div>`; 
                listContainer.innerHTML = `<p class="text-xs text-center text-slate-500 py-4">Kosong.</p>`; 
                if (analysisChartInstance) { analysisChartInstance.destroy(); analysisChartInstance = null; }
                return; 
            }

            const formattedTotal = 'Rp ' + formatCompactRupiah(grandTotal);

            donutContainer.innerHTML = `
                <div class="relative w-48 h-48 mx-auto flex items-center justify-center">
                    <canvas id="analysisDonutCanvas" class="w-full h-full relative z-10"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
                        <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1 mt-1">TOTAL</span>
                        <span class="text-[13px] font-extrabold text-slate-500">${formattedTotal}</span>
                    </div>
                </div>
            `;

            let lHtml = ""; arr.forEach(i => {
                let ic = i.emoji; if(i.img) ic = `<img src="${i.img}" class="w-4 h-4 object-cover rounded-sm inline-block mr-1">`;
                lHtml += `
                <div onclick="openAnalysisItemDetail('${i.id}', '${i.name}')" class="p-3 bg-white border border-slate-200 dark:border-slate-800 dark:bg-slate-900 rounded-xl transition-all duration-200 cursor-pointer hover:border-indigo-300 dark:hover:border-indigo-700 hover:shadow-sm">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs text-slate-500 font-bold flex items-center">${ic} ${i.name}</span>
                        <div class="text-right flex items-center justify-end gap-1.5">
                            <span class="text-xs text-slate-500 font-semibold">${formatRupiah(i.total)}</span>
                            <span class="text-[9px] font-bold text-indigo-600 border border-indigo-400 dark:border-indigo-600/50 px-1.5 py-0.5 rounded-md text-center inline-block min-w-[42px]">${i.pct}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 h-2 rounded-full overflow-hidden mt-2">
                        <div class="h-full rounded-full transition-all duration-500 ease-out" style="width: ${i.pct}%; background-color: ${i.color}"></div>
                    </div>
                </div>`;
            });
            listContainer.innerHTML = lHtml;

            const ctx = document.getElementById('analysisDonutCanvas');
            if (analysisChartInstance) { analysisChartInstance.destroy(); }

            const isDark = document.documentElement.classList.contains('dark');

            analysisChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: arr.map(i => i.name),
                    datasets: [{
                        data: arr.map(i => i.total),
                        backgroundColor: arr.map(i => i.color),
                        borderWidth: isDark ? 2 : 2,
                        borderColor: isDark ? '#0f172a' : '#ffffff',
                        hoverOffset: 12, 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: 15 },
                    cutout: '68%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(25, 25, 25, 0.95)',
                            titleFont: { size: 11, family: "'Plus Jakarta Sans', sans-serif" },
                            bodyFont: { size: 11, weight: 'bold', family: "'Plus Jakarta Sans', sans-serif" },
                            padding: 10,
                            cornerRadius: 6,
                            displayColors: true,
                            boxPadding: 4,
                            bodySpacing: 4,
                            callbacks: {
                                title: function() { return ''; },
                                label: function(context) {
                                    let label = context.label || '';
                                    let value = context.parsed !== null ? formatRupiah(context.parsed) : '';
                                    
                                    // Fungsi otomatis 'enter' (wrap teks per 22 karakter)
                                    const maxChars = 22;
                                    let lines = [];
                                    
                                    if (label.length > maxChars) {
                                        let words = label.split(' ');
                                        let currentLine = '';
                                        
                                        words.forEach(word => {
                                            if ((currentLine + word).length > maxChars) {
                                                lines.push(currentLine.trim());
                                                currentLine = word + ' ';
                                            } else {
                                                currentLine += word + ' ';
                                            }
                                        });
                                        if (currentLine.trim()) lines.push(currentLine.trim());
                                    } else {
                                        lines.push(label);
                                    }
                                    
                                    // Gabungkan baris teks yang sudah di-wrap dengan nominal Rupiah di paling bawah
                                    lines.push(value);
                                    return lines;
                                }
                            }
                        }
                    }
                }
            });
        }

        let activeBreakdownSortMode = 'newest';
        function openAnalysisItemDetail(itemId, itemName) { openFullOverlay(() => { return renderAnalysisItemDetailHTML(itemId, itemName); }, `<p class= "text-slate-500">${itemName}</p>`, "overlay-analysisitemdetail"); }

        function renderAnalysisItemDetailHTML(itemId, itemName) {
            const fullTxs = getFilteredAnalysisTxs(); 
            let filtered = fullTxs.filter(t => analysisGroupType === 'category' ? t.categoryId === itemId : t.sourceId === itemId);

            if (activeBreakdownSortMode === 'newest') filtered.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            else filtered.sort((a,b) => b.amount - a.amount);

            let lHtml = ""; 
            filtered.forEach(t => {
                const sub = analysisGroupType === 'category' ? (state.sources.find(s => s.id === t.sourceId) || { name: 'Umum' }) : (state.categories.find(c => c.id === t.categoryId) || { name: 'Lainnya' });
                const pct = scopeTotal > 0 ? ((t.amount / scopeTotal) * 100).toFixed(2) : "0.00";
                
                const [y, m, d] = t.date.split('-');
                const txDateLocal = new Date(y, m-1, d);
                const formattedDate = txDateLocal.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });

                lHtml += `
                <div class="p-3 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-xl space-y-2">
                    <div class="flex items-center justify-between">
                        <div>
                            <h5 class="text-xs font-bold text-slate-800 dark:text-slate-200">${t.desc || itemName}</h5>
                            <span class="text-[9px] text-slate-400 font-semibold flex items-center mt-0.5">${analysisGroupType === 'category' ? `Sumber: ${sub.name}` : `Kategori: ${sub.name}`} • ${formattedDate}</span>
                        </div>
                        <div class="text-right flex flex-col items-end">
                            <span class="text-xs font-extrabold text-indigo-600 dark:text-indigo-400">${formatRupiah(t.amount)}</span>
                            <span class="text-[8px] font-bold text-indigo-600 bg-indigo-50 dark:bg-indigo-900/40 dark:text-indigo-400 px-1.5 py-0.5 rounded-md mt-1">${pct}%</span>
                        </div>
                    </div>
                    <div class="w-full bg-slate-100 dark:bg-slate-800 h-1.5 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 rounded-full" style="width: ${pct}%"></div>
                    </div>
                </div>`;
            });
            
            return `
            <div class="p-4 space-y-4">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Urutkan Berdasar</span>
                    <div class="bg-slate-100 dark:bg-slate-800 p-0.5 rounded-lg flex">
                        <button onclick="toggleBreakdownSort('${itemId}', '${itemName}', 'newest')" class="px-2.5 py-1 text-[9px] font-bold rounded-md transition-colors ${activeBreakdownSortMode==='newest'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-xs':'text-slate-500'}">Terbaru</button>
                        <button onclick="toggleBreakdownSort('${itemId}', '${itemName}', 'largest')" class="px-2.5 py-1 text-[9px] font-bold rounded-md transition-colors ${activeBreakdownSortMode==='largest'?'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 shadow-xs':'text-slate-500'}">Terbesar</button>
                    </div>
                </div>
                <div class="p-4 bg-indigo-600 text-white rounded-xl shadow-md">
                    <span class="text-[9px] font-bold text-indigo-200 uppercase tracking-widest block">TOTAL LINGKUP INI</span>
                    <h4 class="text-xl font-extrabold mt-1">${formatRupiah(scopeTotal)}</h4>
                </div>
                <div class="space-y-2">
                    ${lHtml || '<p class="text-xs text-center py-4 text-slate-400">Tidak ada transaksi terdata.</p>'}
                </div>
            </div>`;
        }

        function toggleBreakdownSort(itemId, itemName, mode) { activeBreakdownSortMode = mode; openAnalysisItemDetail(itemId, itemName); }

        function renderTrendsChart() {
            const canvas = document.getElementById('trends-chart-canvas');
            if (!canvas) return;

            const year = state.currentYear; const month = state.currentMonth;
            const daysInMonth = new Date(year, month, 0).getDate();

            const dataIn = []; const dataOut = []; const dataDiff = [];

            for (let day = 1; day <= daysInMonth; day++) {
                const dayStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayTxs = state.transactions.filter(t => t.accountId === state.activeAccountId && t.date === dayStr && !t.deletedAt);
                const inc = dayTxs.filter(t => t.type === 'income').reduce((sum,t) => sum + t.amount, 0);
                const exp = dayTxs.filter(t => t.type === 'expense').reduce((sum,t) => sum + t.amount, 0);
                dataIn.push(inc); dataOut.push(exp); dataDiff.push(inc - exp);
            }

            let svgLines = "", limitsHtml = "";
            const widthStep = 100 / (daysInMonth - 1);

            // --- Modifikasi: Membuat Garis Vertikal Hanya untuk Tanggal Ganjil ---
            let verticalGrid = "";
            for (let i = 0; i < daysInMonth; i++) {
                const day = i + 1;
                // Hanya buat garis jika hari bernilai ganjil
                if (day % 2 !== 0) {
                    const x = i * widthStep;
                    verticalGrid += `<line x1="${x}" y1="0" x2="${x}" y2="100" stroke="#334155" stroke-width="0.1" stroke-dasharray="0.5,0.5" />`;
                }
            }

            if (trendChartFilterMode === 'selisih') {
                const maxAbs = Math.max(1000, ...dataDiff.map(Math.abs));
                let points = "";
                for (let i = 0; i < daysInMonth; i++) {
                    const x = i * widthStep;
                    const normalized = (dataDiff[i] / maxAbs);
                    const y = 50 - (normalized * 50); 
                    points += `${x},${y} `;
                }
                svgLines = `${verticalGrid}<polyline fill="none" stroke="#6366f1" stroke-width="0.3" points="${points}"></polyline>`;
                limitsHtml = `
                    <div class="absolute inset-x-0 top-[10%] border-b border-dashed border-slate-300 dark:border-slate-700"><span class="absolute left-0 -top-3 text-[7px] font-bold text-emerald-500">${formatCompactRupiah(maxAbs)}</span></div>
                    <div class="absolute inset-x-0 top-[90%] border-b border-dashed border-slate-300 dark:border-slate-700"><span class="absolute left-0 -top-3 text-[7px] font-bold text-rose-500">-${formatCompactRupiah(maxAbs)}</span></div>
                `;
            } else {
                const dataArr = trendChartFilterMode === 'masuk' ? dataIn : dataOut;
                const maxAmount = Math.max(1000, ...dataArr);
                const color = trendChartFilterMode === 'masuk' ? '#10b981' : '#ef4444';
                let points = "";
                for (let i = 0; i < daysInMonth; i++) {
                    const x = i * widthStep;
                    const y = 100 - ((dataArr[i] / maxAmount) * 100);
                    points += `${x},${y} `;
                }
                svgLines = `${verticalGrid}<polyline fill="none" stroke="${color}" stroke-width="0.3" points="${points}"></polyline>`;
                limitsHtml = `
                    <div class="absolute inset-x-0 top-[10%] border-b border-dashed border-slate-300 dark:border-slate-700"><span class="absolute left-0 -top-3 text-[7px] font-bold text-slate-500">${formatCompactRupiah(maxAmount)}</span></div>

                `;
            }

            // --- Modifikasi: Menampilkan Label Hanya untuk Tanggal Ganjil ---
            let dateLabelsHtml = "";
            for (let day = 1; day <= daysInMonth; day++) {
                // Hanya render teks angka jika hari bernilai ganjil
                if (day % 2 !== 0) {

                    `;

            }

            const dHtml = `
                <div class="absolute bottom-0 inset-x-0 h-3">
                    ${dateLabelsHtml}
