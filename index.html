        }

        function renderAnnualSummaryChart() {
            const canvas = document.getElementById('annual-bar-canvas');
            if (!canvas) return;

            const year = state.currentYear;
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
    
            const incomeData = []; const expenseData = [];
            for (let m = 1; m <= 12; m++) {
                const prefix = `${year}-${String(m).padStart(2, '0')}`;
                const monthlyTxs = state.transactions.filter(t => t.accountId === state.activeAccountId && t.date.startsWith(prefix) && !t.deletedAt);
                incomeData.push(monthlyTxs.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0));
                expenseData.push(monthlyTxs.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0));
            }

            const maxVal = Math.max(...incomeData, ...expenseData, 1000);

            // 1. GENERATE 11 LINES (10 POSITIVE + 1 ZERO LINE)
            let gridLinesHtml = "";
            const totalLines = 11;
    
            for (let i = 0; i < totalLines; i++) {
                const topPercentage = (i / (totalLines - 1)) * 100;
                const lineValue = maxVal - (i / (totalLines - 1)) * maxVal;
        
                gridLinesHtml += `
                    <div class="absolute inset-x-0 w-full border-b border-dashed border-slate-300 dark:border-slate-700" style="top: ${topPercentage}%">
                        <span class="absolute left-0 -top-3 text-[7px] font-bold text-slate-500">${formatCompactRupiah(lineValue)}</span>
                    </div>
                `;
            }

            // 2. GENERATE BARS HTML (Batang murni tanpa teks bulan di dalamnya agar tidak merusak tinggi)
            let barsHtml = "";
            months.forEach((mName, idx) => {
                const incHeight = (incomeData[idx] / maxVal) * 100; 
                const expHeight = (expenseData[idx] / maxVal) * 100;
                barsHtml += `
                    <div class="flex items-end justify-center h-full flex-1 gap-[1px] relative z-10">
                        <div class="w-1.5 bg-emerald-500 rounded-t-xs" style="height: ${incHeight}%"></div>
                        <div class="w-1.5 bg-rose-500 rounded-t-xs" style="height: ${expHeight}%"></div>
                    </div>
                `;
            });

            // 3. GENERATE MONTH LABELS FOOTER HTML
            let monthsHtml = "";
            months.forEach((mName) => {
                monthsHtml += `<span class="flex-1 text-center text-[8px] font-bold text-slate-500">${mName}</span>`;
            });

            // 4. COMBINE WITH STRICT SEPARATION BETWEEN CHART AREA AND LABELS
            // Menghilangkan bug dengan memisah area plot diagram (relative) dan baris bulan di bawahnya secara berurutan (flex-col)
            canvas.innerHTML = `
                <div class="flex flex-col w-full h-full justify-between">
            
                    <div class="relative flex-1 w-full mb-3">
                        ${gridLinesHtml}
                
                        <div class="absolute inset-0 flex items-end justify-between w-full">
                            ${barsHtml}
                        </div>
                    </div>
            
                    <div class="flex justify-between w-full pt-1 border-t border-slate-200 dark:border-slate-700">
                        ${monthsHtml}
                    </div>

                </div>
            `;
        }

                    const monthPrefix = `${state.currentYear}-${String(state.currentMonth).padStart(2,'0')}`;
                    const spent = state.transactions.filter(t => t.accountId === state.activeAccountId && t.categoryId === b.categoryId && t.type === 'expense' && t.date.startsWith(monthPrefix) && !t.deletedAt).reduce((sum, t) => sum + t.amount, 0);

                                            <span id="transfer-from-src-label" class="truncate mr-1">${defaultFromLabel}</span>

                                    <div>

                                        <button type="button" onclick="openTransferSourcePicker('to')" id="transfer-to-src-btn" class="w-full mt-1 p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-500 font-bold border rounded-lg text-left flex justify-between items-center focus:outline-none">
                                            <span id="transfer-to-src-label" class="truncate mr-1">${defaultToLabel}</span>
                                            <span class="text-slate-400 text-[9px] shrink-0">▼</span>

                                        <div class="relative" id="transfer-amount-container">
                                            <input type="text" id="transfer-amount" value="" onfocus="triggerKeypadShow('transfer-amount')" inputmode="none" placeholder="Rp 0" class="w-full mt-1 p-2 pl-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-500 placeholder:text-slate-400 font-bold border rounded-lg focus:outline-none focus:border-indigo-500">
                                            <p class="absolute left-3 top-3 text-[12px] text-slate-500 font-bold">Rp.</p>

                                    </div>
                                    <div><label class="text-[9px] text-slate-500 font-bold">TANGGAL</label><input type="date" id="transfer-date" value="${dateNowLocal}" class="w-full mt-1 p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-500 font-bold border rounded-lg"></div>
                                </div>
                                <div>
                                    <label class="text-[9px] text-slate-500 font-bold">DESKRIPSI (OPSIONAL)</label>
                                    <input 
                                        type="text" 
                                        id="transfer-desc" 
                                        placeholder="Contoh: Pindah tabungan, tukar cash..." 
                                        enterkeyhint="done"
                                        onkeydown="if(event.key === 'Enter') { event.preventDefault(); this.blur(); }"
                                        class="w-full mt-1 p-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-xs text-slate-500 placeholder:text-slate-400 font-bold border rounded-lg focus:outline-none focus:border-indigo-500"
                                    >

                                <div id="custom-keypad" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900 p-4 pb-6 rounded-t-3xl shadow-[0_-8px_30px_rgb(0,0,0,0.12)] z-[50] translate-y-full transition-transform duration-300">
                                    <div class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-4"></div>

                                        <button onclick="pressKey('2')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">2</button>
                                        <button onclick="pressKey('3')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">3</button>
                                        <button onclick="pressKey('clear')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">C</button>
                            
                                        <button onclick="pressKey('4')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">4</button>
                                        <button onclick="pressKey('5')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">5</button>
                                        <button onclick="pressKey('6')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">6</button>
                                        <div class="grid grid-cols-2 gap-1">
                                            <button onclick="pressKey('*')" class="py-3  text-white font-bold text-sm bg-indigo-600 rounded-xl active:bg-indigo-500">×</button>
                                            <button onclick="pressKey('/')" class="py-3  text-white font-bold text-sm bg-indigo-600 rounded-xl active:bg-indigo-500">÷</button>

                                        <button onclick="pressKey('7')" class="py-3  text-white font-bold text-lg bg-slate-800 rounded-xl active:bg-slate-700">7</button>

        // Fungsi Kustom Pop-up Pilihan Sumber Dana untuk Mutasi Transfer
        function openTransferSourcePicker(targetType) {
            const balances = getBalancesAt(state.activeAccountId, state.currentYear, state.currentMonth);
            const filteredSrcs = state.sources.filter(s => s.accountId === state.activeAccountId && !s.deletedAt);
            
            let optionsHTML = '<div class="grid grid-cols-1 gap-2 max-h-60 overflow-y-auto pr-1">';
            
            if (filteredSrcs.length === 0) {
                optionsHTML += `<p class="text-xs text-slate-400 text-center py-4">Tidak ada sumber dana tersedia</p>`;
            } else {
                filteredSrcs.forEach(s => {
                    const bal = balances[s.id] !== undefined ? balances[s.id] : 0;
                    const fullLabel = `${s.name} (${formatCompactRupiah(bal)})`;
                    optionsHTML += `
                        <button onclick="selectTransferSource('${targetType}', '${s.id}', '${fullLabel}')" class="w-full p-3 bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-bold rounded-xl text-left flex items-center gap-2 transition-colors">
                            <i data-lucide="wallet" class="w-4 h-4 text-slate-400"></i> <span>${s.name}</span> <span class="text-[10px] text-slate-400 font-normal ml-auto">Saldo : ${formatCompactRupiah(bal)}</span>
                        </button>
                    `;
                });
            }
            optionsHTML += '</div>';

            const modalTitle = targetType === 'from' ? "Pilih Sumber Asal" : "Pilih Sumber Tujuan";

            showTutorialModal(
                modalTitle, 
                optionsHTML, 
                "wallet", 
                `<button onclick="closeTutorialModal();" class="w-full py-2.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg">Batal</button>`
            );
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function selectTransferSource(targetType, id, label) {
            const inputElement = document.getElementById(`transfer-${targetType}-src`);
            const labelElement = document.getElementById(`transfer-${targetType}-src-label`);
            if (inputElement && labelElement) {
                inputElement.value = id;
                labelElement.innerText = label;
            }
            closeTutorialModal();
        }

        function processFundTransfer() {
            const fromId = document.getElementById('transfer-from-src').value; 
            const toId = document.getElementById('transfer-to-src').value; 
    
            // MODIFIKASI: Bersihkan karakter titik (.) dari string input teks nominal
            const rawAmtStr = document.getElementById('transfer-amount').value.replace(/\./g, '');
            // Jika kosong, set ke 0 agar terdeteksi tidak valid di validasi bawahnya
            const amt = rawAmtStr === "" ? 0 : parseFloat(rawAmtStr); 
    
            const dateStr = document.getElementById('transfer-date').value;
            const descStr = document.getElementById('transfer-desc').value.trim();
    
            if (fromId === toId || isNaN(amt) || amt <= 0 || !dateStr) { showToast("Data tidak valid/sama."); return; }

            const balances = getBalancesAt(state.activeAccountId, state.currentYear, state.currentMonth);
            if ((balances[fromId] || 0) < amt) { showToast("Saldo asal tidak cukup."); return; }

            requestConfirm("Mutasi", `Kirim ${formatRupiah(amt)}?`, () => {
                const now = new Date();
                const dateTimeLocal = new Date(`${dateStr}T${getLocalHHMM(now)}`);
                
                state.transfers.push({ id: 'trf-' + Date.now(), fromSourceId: fromId, toSourceId: toId, amount: amt, date: dateStr, desc: descStr, timestamp: dateTimeLocal.toISOString(), accountId: state.activeAccountId });
                saveDataToLocalStorage(); logAction(`Mutasi dana sebesar ${formatRupiah(amt)}`); openFundsTransfer(); showToast("Berhasil.");
            });
        }

                                <button onclick="setCategoryEditType('expense')" class="px-3 py-1.5 text-[10px] font-bold rounded-md ${catEditType==='expense'?'bg-rose-500 text-white shadow-xs':'text-slate-500'}">Pengeluaran</button>

        function confirmRecFrequency() { 
            recFrequencyData.days = document.getElementById('freq-days').value; 
            recFrequencyData.weeks = document.getElementById('freq-weeks').value; 
            recFrequencyData.months = document.getElementById('freq-months').value; 
            recFrequencyData.limit = document.getElementById('rec-repeat-limit').value; 
            popNav();

        }

        function saveRecurringTransaction() {
            const count = recFrequencyData.limit === "" ? 0 : parseInt(recFrequencyData.limit); 
            const rawAmtStr = document.getElementById('rec-amount').value.replace(/\./g, '');
            const amt = rawAmtStr === "" ? 0 : parseFloat(rawAmtStr); 
            
            const startDateVal = document.getElementById('rec-start-date').value; 
            const startTimeVal = document.getElementById('rec-start-time').value;
            const catId = document.getElementById('rec-category').value; 
            const srcId = document.getElementById('rec-source').value; 
            const desc = document.getElementById('rec-desc').value.trim();
            
            // 1. Pastikan input diubah ke angka (jika kosong, jadikan 0)
            const d = parseInt(recFrequencyData.days) || 0;
            const w = parseInt(recFrequencyData.weeks) || 0;
            const m = parseInt(recFrequencyData.months) || 0;

            // 2. Cek apakah ketiganya bernilai 0
            if (d === 0 && w === 0 && m === 0) { 
                showToast("Frekuensi minimal harus 1 hari, minggu, atau bulan."); 
                return; 
            }

            if (isNaN(count) || count <= 0 || isNaN(amt) || amt <= 0 || !startDateVal || !startTimeVal || !catId || !srcId) { 
                showToast("Data tidak valid/belum lengkap."); 
                return; 
            }
            
            const localStartObj = new Date(`${startDateVal}T${startTimeVal}`);

            state.recurring.push({ id: 'rec-' + Date.now(), type: recActiveType, freq: { days: recFrequencyData.days, weeks: recFrequencyData.weeks, months: recFrequencyData.months }, count: count, amount: amt, nextRunDate: localStartObj.toISOString(), categoryId: catId, sourceId: srcId, desc: desc, accountId: state.activeAccountId, runCount: 0 });
            saveDataToLocalStorage(); 
            logAction(`Menjadwalkan otomatisasi transaksi.`); 
            recFrequencyData = { days: "", weeks: "", months: "", limit: "" }; 
            processRecurringTransactions(); 
            openRecurringTransactions(); 
            showToast("Dijadwalkan.");
        }
        function deleteRecurring(id) {
            requestConfirm("Hapus", "Pindah ke Sampah?", () => {
                const rec = state.recurring.find(r => r.id === id);
                if(rec) { state.trash.push({ id: 'trash-' + Date.now(), type: 'recurring', refId: id, name: rec.desc, deletedAt: new Date().toISOString(), payload: JSON.stringify(rec), accountId: state.activeAccountId }); state.recurring = state.recurring.filter(r => r.id !== id); saveDataToLocalStorage(); logAction("Menghapus penjadwalan transaksi."); openRecurringTransactions(); showToast("Dihapus."); }
            });
        }

        function exportStateDataFile() {
            const now = new Date();
            const y = now.getFullYear(); const m = String(now.getMonth() + 1).padStart(2, '0'); const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0'); const min = String(now.getMinutes()).padStart(2, '0'); const s = String(now.getSeconds()).padStart(2, '0');
            const ts = `${y}${m}${d}_${h}${min}${s}`;

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `FinTrace_Backup_${ts}.json`);
            document.body.appendChild(dlAnchor); dlAnchor.click(); dlAnchor.remove();
            logAction("Mencadangkan data JSON."); showToast("Dicadangkan.");
        }

        function importStateDataFile(event) {
            const file = event.target.files[0]; 
            if (!file) return;

            if (!file.name.toLowerCase().endsWith('.json') && file.type !== 'application/json') {
                showToast("Harap pilih file berformat .json");
                event.target.value = ''; 
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.activeAccountId && parsed.accounts) { 
                        state = parsed; 
                        saveDataToLocalStorage(); 
                        logAction("Memulihkan cadangan."); 
                        updateHeaderDetails(); 
                        showToast("Dipulihkan."); 
                        popNav(); 
                        switchTab('home'); 
                    } 
                    else { showToast("Format JSON FinTrace tidak valid."); }
                } catch(err) { showToast("Gagal membaca isi file."); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

            const modalId = 'notebook-custom-dialog-' + Date.now();
            const modalEl = document.createElement('div');
            modalEl.id = modalId;
            modalEl.className = "fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center p-4 z-[99999] animate-fade-in";

                    </div>
                </div>
            `;
            document.body.appendChild(modalEl);
            
            const inputField = document.getElementById(`${modalId}-input`);
            inputField.focus();
            inputField.select();

            const closeDialog = () => { modalEl.remove(); };

            document.getElementById(`${modalId}-cancel`).onclick = closeDialog;

                const val = inputField.value.trim();

        function getNotebookFolderPath(folderId) {
            if (!folderId) return "Root";
            let path = [];
            let current = state.folders.find(f => f.id === folderId);
            while (current) {
                path.unshift(current.name);
                current = state.folders.find(f => f.id === current.parentId);
            }
            return path.join(" / ");
        }

        function getPrecisionDateTime() {
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            return `${dd}-${mm}-${yyyy}|${hh}:${min}`;
        }

            const currentCtx = folderId || 'root';

            } else {
                breadcrumbs.innerHTML = ``;
            }
        
            let filteredFolders = (state.folders || []).filter(f => f.accountId === state.activeAccountId);
            let filteredNotes = state.notes.filter(n => n.accountId === state.activeAccountId);
        
            if (notebookSearchTerm) {
                filteredFolders = []; 
                filteredNotes = filteredNotes.filter(n => n.title.toLowerCase().includes(notebookSearchTerm) || n.content.toLowerCase().includes(notebookSearchTerm));
            } else {
                filteredFolders = filteredFolders.filter(f => folderId === null ? !f.parentId : f.parentId === folderId);
                filteredNotes = filteredNotes.filter(n => n.folderId === folderId || (!n.folderId && folderId === null));
            }
            
            filteredNotes.sort((a,b) => b.id.localeCompare(a.id));
        
            if (filteredFolders.length === 0 && filteredNotes.length === 0) {
                container.innerHTML = `<div class="col-span-2 pt-16 flex flex-col items-center justify-center text-slate-400 w-full"><i data-lucide="folder-open" class="w-12 h-12 mb-3 opacity-20"></i><p class="text-xs text-center">Kosong.</p></div>`;

                        onpointerup="endLongPress(event, '${folder.id}', 'folder', '${folderId || ''}')" 
                        onpointerleave="endLongPress(event, null, null, null)"
                        class="p-3 border rounded-xl cursor-pointer transition-all shadow-xs flex items-center justify-between select-none touch-none w-full
                        ${isSelected ? 'bg-indigo-50 dark:bg-indigo-950/40 border-indigo-500 ring-1 ring-indigo-500' : 'bg-amber-50 dark:bg-amber-950/30 border-amber-200 dark:border-amber-900/50 hover:border-amber-400'}"
                    >
                        <div class="flex items-center gap-2.5 overflow-hidden pointer-events-none">
                            <i data-lucide="${isSelected ? 'check-square' : 'folder'}" class="w-5 h-5 ${isSelected ? 'text-indigo-600' : 'text-amber-500'} shrink-0"></i>
                            <div class="truncate">
                                <h6 class="text-xs font-bold text-slate-800 dark:text-slate-100 truncate leading-tight">${folder.name}</h6>
                                <span class="text-[9px] text-slate-400 font-medium">${totalSubFolders} Folder • ${totalNotes} Catatan</span>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400 shrink-0 pointer-events-none"></i>
                    </div>
                `;
            });
        
            // Render Catatan
            filteredNotes.forEach(note => {
                const isSelected = selectedItems.some(i => i.id === note.id && i.type === 'note');
                const pathInfoHtml = notebookSearchTerm 
                    ? `<div class="text-[8px] text-indigo-500 dark:text-indigo-400 font-semibold truncate mb-1 flex items-center gap-0.5"><i data-lucide="folder" class="w-2 h-2"></i> ${getNotebookFolderPath(note.folderId)}</div>` 
                    : '';
                
                itemsHtml += `
                    <div 
                        onpointerdown="startLongPress(event, '${note.id}', 'note', '${folderId || ''}')" 
                        onpointerup="endLongPress(event, '${note.id}', 'note', '${folderId || ''}')" 
                        onpointerleave="endLongPress(event, null, null, null)"
                        class="p-3.5 border rounded-xl cursor-pointer transition-all shadow-xs select-none touch-none w-full
                        ${isSelected ? 'bg-indigo-50 dark:bg-indigo-950/40 border-indigo-500 ring-1 ring-indigo-500' : 'bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 hover:border-indigo-300'}"
                    >
                        ${pathInfoHtml}
                        <div class="flex items-center gap-2 mb-1.5 justify-between pointer-events-none">
                            ${note.title ? `<h6 class="text-xs font-bold text-slate-800 dark:text-slate-100 leading-tight truncate">${note.title}</h6>` : `<span class="text-[10px] text-slate-400 italic">Tanpa judul</span>`}
                            ${isSelected ? `<i data-lucide="check-circle-2" class="w-3.5 h-3.5 text-indigo-600 shrink-0"></i>` : ''}
                        </div>
                        <p class="text-[10px] text-slate-600 dark:text-slate-400 whitespace-pre-line line-clamp-6 leading-relaxed pointer-events-none">${note.content}</p>
                    </div>
                `;
            });
        
            container.innerHTML = itemsHtml;
            updateSelectionBarUI(folderId);
            updateFloatingClipboardUI(); 
            lucide.createIcons();
        }
        
        // --- STABILIZER LOGIKA TEKAN LAMA (LONG PRESS) ---
        function startLongPress(event, id, type, currentFolderCtx) {
            if (notebookClipboard.action) return; 
            if (event.pointerType === 'mouse' && event.button !== 0) return; 
            
            isLongPressActive = false;
            clearTimeout(longPressTimer);
            
            longPressTimer = setTimeout(() => {
                isLongPressActive = true;
                if (!notebookSelectionMode) {
                    notebookSelectionMode = true;
                    toggleItemSelection(id, type);
                    document.getElementById(`notebook-floating-menu-group-${currentFolderCtx || 'root'}`)?.classList.add('hidden');
                    renderNotebookNotes(currentFolderCtx ? currentFolderCtx : null);
                    if (navigator.vibrate) navigator.vibrate(50);
                }
            }, 600);
        }
        
        function endLongPress(event, id, type, currentFolderCtx) {
            clearTimeout(longPressTimer);
            
            if (!isLongPressActive && id !== null) {
                if (notebookSelectionMode) {
                    toggleItemSelection(id, type);
                    renderNotebookNotes(currentFolderCtx ? currentFolderCtx : null);
                } else {
                    if (type === 'folder') {
                        openNotebookPage(id);
                    } else {
                        openNoteEditor(id, currentFolderCtx);
                    }
                }
            }
            isLongPressActive = false;
        }
        
        function toggleItemSelection(id, type) {
            const index = selectedItems.findIndex(i => i.id === id && i.type === type);
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                selectedItems.push({ id, type });
            }
            if (selectedItems.length === 0) {
                const activeLayer = document.querySelector('.notebook-container-layer');
                const ctx = activeLayer ? activeLayer.getAttribute('data-folder-id') : null;
                exitSelectionMode(ctx);
            }
        }
        
        function exitSelectionMode(currentFolderCtx) {
            notebookSelectionMode = false;
            selectedItems = [];
            window.onpopstate = null;
            const ctxId = currentFolderCtx || 'root';
            document.getElementById(`notebook-floating-menu-group-${ctxId}`)?.classList.remove('hidden');
            renderNotebookNotes(currentFolderCtx ? currentFolderCtx : null);
        }
        
        // --- BAR SELEKSI ITEM ---
        function updateSelectionBarUI(folderId) {
            const currentCtx = folderId || 'root';
            const actionBar = document.getElementById(`notebook-action-bar-${currentCtx}`);
            if (!actionBar) return;
        
            if (notebookSelectionMode) {
                const isSingleSelection = selectedItems.length === 1;
                actionBar.innerHTML = `
                    <button onclick="handleRenameAction('${folderId || ''}')" class="flex flex-col items-center gap-1 text-[10px] font-bold ${!isSingleSelection ? 'opacity-30 cursor-not-allowed' : 'text-slate-700 dark:text-slate-300'}">
                        <i data-lucide="edit-2" class="w-5 h-5"></i> Ubah Nama
                    </button>
                    <button onclick="handleDeleteSelected('${folderId || ''}')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-red-500">
                        <i data-lucide="trash-2" class="w-5 h-5"></i> Hapus
                    </button>
                    <button onclick="handleClipboardAction('copy', '${folderId || ''}')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-indigo-600">
                        <i data-lucide="copy" class="w-5 h-5"></i> Salin
                    </button>
                    <button onclick="handleClipboardAction('move', '${folderId || ''}')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-amber-600">
                        <i data-lucide="move" class="w-5 h-5"></i> Pindahkan
                    </button>
                    <button onclick="exitSelectionMode('${folderId || ''}')" class="flex flex-col items-center gap-1 text-[10px] font-bold text-slate-400">
                        <i data-lucide="x" class="w-5 h-5"></i> Batal
                    </button>
                `;
                actionBar.classList.remove('translate-y-full');
                document.getElementById(`notebook-floating-menu-group-${currentCtx}`)?.classList.add('hidden');
            } else {
                actionBar.classList.add('translate-y-full');
                if (!notebookClipboard.action) {
                    document.getElementById(`notebook-floating-menu-group-${currentCtx}`)?.classList.remove('hidden');
                }
            }
        }
        
        // --- POP-UP FLOATING CLIPBOARD ---
        function updateFloatingClipboardUI() {
            document.getElementById('notebook-global-clipboard-dock')?.remove();
            if (!notebookClipboard.action) return;
        
            const dock = document.createElement('div');
            dock.id = 'notebook-global-clipboard-dock';
            dock.className = "fixed bottom-4 left-4 right-4 bg-slate-900/95 dark:bg-slate-900/98 backdrop-blur-md border border-slate-800 text-white p-4 rounded-2xl shadow-2xl z-[9999] flex justify-between items-center";
            
            const actionText = notebookClipboard.action === 'copy' ? 'Menyalin' : 'Memindahkan';
            const itemsCount = notebookClipboard.items.length;
        
            dock.innerHTML = `
                <div class="flex flex-col max-w-[40%]">
                    <span class="text-xs font-bold text-indigo-400 flex items-center gap-1">
                        <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                        ${actionText} ${itemsCount} Item
                    </span>
                    <span class="text-[9px] text-slate-400 truncate">Jelajahi direktori, ketuk Letakkan</span>
                </div>
                <div class="flex gap-1.5 items-center">
                    <button onclick="promptCreateFolderAtClipboardCtx()" class="px-2.5 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-emerald-400 text-[10px] font-bold rounded-xl transition-colors flex items-center gap-0.5">
                        <i data-lucide="folder-plus" class="w-3 h-3"></i> + Folder
                    </button>
                    <button onclick="cancelClipboardGlobal()" class="px-2.5 py-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 text-[10px] font-bold rounded-xl transition-colors">
                        Batal
                    </button>
                    <button onclick="executePasteAtActiveDirectory()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white text-[10px] font-bold rounded-xl shadow-lg flex items-center gap-1 transition-transform active:scale-95">
                        <i data-lucide="clipboard-check" class="w-3.5 h-3.5"></i> Letakkan
                    </button>
                </div>
            `;
            
            document.body.appendChild(dock);
            lucide.createIcons();
            
            document.querySelectorAll("[id^='notebook-floating-menu-group-']").forEach(el => el.classList.add('hidden'));
        }

        function promptCreateFolderAtClipboardCtx() {
            const layers = document.querySelectorAll('.notebook-container-layer');
            let activeFolderId = null;
            if (layers.length > 0) {
                const topActiveLayer = layers[layers.length - 1];
                activeFolderId = topActiveLayer.getAttribute('data-folder-id') || null;
            }

            // Implementasi Kustom Pop-up Tengah Layar menggantikan prompt()
            showNotebookInputDialog("Folder Baru", "Masukkan nama folder...", "", (name) => {
                if (!name) return;
                if(!state.folders) state.folders = [];
                state.folders.push({ id: 'folder-' + Date.now(), name: name, accountId: state.activeAccountId, parentId: activeFolderId });
                
                logAction(`Membuat folder baru: ${name}`);
                saveDataToLocalStorage(); 
                showToast("Folder baru dibuat."); 
                
                renderNotebookNotes(activeFolderId);
                if (activeFolderId) {
                    const currentFolder = state.folders.find(f => f.id === activeFolderId);
                    if (currentFolder) renderNotebookNotes(currentFolder.parentId);
                }
            });
        }
        
        function executePasteAtActiveDirectory() {
            const layers = document.querySelectorAll('.notebook-container-layer');
            let activeFolderId = null;
            if (layers.length > 0) {
                const topActiveLayer = layers[layers.length - 1];
                activeFolderId = topActiveLayer.getAttribute('data-folder-id') || null;
            }
            executePaste(activeFolderId);
        }
        
        function cancelClipboardGlobal() {
            const layers = document.querySelectorAll('.notebook-container-layer');
            let activeFolderCtx = 'root';
            if (layers.length > 0) {
                const topActiveLayer = layers[layers.length - 1];
                const idAttr = topActiveLayer.getAttribute('data-folder-id');
                if(idAttr) activeFolderCtx = idAttr;
            }
            
            notebookClipboard.action = null;
            notebookClipboard.items = [];
            
            document.getElementById('notebook-global-clipboard-dock')?.remove();
            showToast("Aksi dibatalkan.");
            
            document.getElementById(`notebook-floating-menu-group-${activeFolderCtx}`)?.classList.remove('hidden');
            renderNotebookNotes(activeFolderCtx === 'root' ? null : activeFolderCtx);
        }
        
        // --- TRANSAKSI DATA CLIPBOARD ---
        function handleClipboardAction(actionType, currentFolderCtx) {
            notebookClipboard.action = actionType;
            notebookClipboard.items = [...selectedItems];
            notebookSelectionMode = false;
            selectedItems = [];
            showToast(actionType === 'copy' ? "Disalin ke papan klip." : "Dipotong ke papan klip.");
            renderNotebookNotes(currentFolderCtx ? currentFolderCtx : null);
        }
        
        function executePaste(destinationFolderId) {
            const destId = destinationFolderId || null;
            let successCount = 0;
            let sourceFolderIds = new Set();

            notebookClipboard.items.forEach(item => {
                if (item.type === 'folder') {
                    const f = state.folders.find(x => x.id === item.id);
                    if (f) sourceFolderIds.add(f.parentId || 'root');
                } else {
                    const n = state.notes.find(x => x.id === item.id);
                    if (n) sourceFolderIds.add(n.folderId || 'root');
                }

                if (notebookClipboard.action === 'move') {
                    if (item.type === 'folder') {
                        if (item.id === destId) return; 
                        let parent = state.folders.find(f => f.id === destId);
                        let isLoop = false;
                        while(parent) {
                            if(parent.id === item.id) { isLoop = true; break; }
                            parent = state.folders.find(f => f.id === parent.parentId);
                        }
                        if(isLoop) return;
                        const folder = state.folders.find(f => f.id === item.id);
                        if (folder) { 
                            folder.parentId = destId; 
                            successCount++; 
                            logAction(`Memindahkan folder: ${folder.name}`);
                        }
                    } else {
                        const note = state.notes.find(n => n.id === item.id);
                        if (note) { 
                            note.folderId = destId; 
                            successCount++; 
                            logAction(`Memindahkan catatan: ${note.title || 'Tanpa judul'}`);
                        }
                    }
                } else if (notebookClipboard.action === 'copy') {
                    if (item.type === 'folder') {
                        const srcFolder = state.folders.find(f => f.id === item.id);
                        if (srcFolder) {
                            const newFolderId = 'folder-' + Date.now() + Math.random().toString(36).substr(2, 4);
                            state.folders.push({ id: newFolderId, name: srcFolder.name + " - Salinan", accountId: state.activeAccountId, parentId: destId });
                            state.notes.filter(n => n.folderId === srcFolder.id && n.accountId === state.activeAccountId).forEach(n => {
                                state.notes.push({ id: 'note-' + Date.now() + Math.random().toString(36).substr(2, 4), title: n.title, content: n.content, folderId: newFolderId, date: n.date || getPrecisionDateTime(), lastEdit: getPrecisionDateTime(), accountId: state.activeAccountId });
                            });
                            successCount++;
                            logAction(`Menyalin folder: ${srcFolder.name}`);
                        }
                    } else {
                        const srcNote = state.notes.find(n => n.id === item.id);
                        if (srcNote) {
                            state.notes.push({ id: 'note-' + Date.now() + Math.random().toString(36).substr(2, 4), title: srcNote.title ? srcNote.title + " (Salinan)" : "", content: srcNote.content, folderId: destId, date: srcNote.date || getPrecisionDateTime(), lastEdit: getPrecisionDateTime(), accountId: state.activeAccountId });
                            successCount++;
                            logAction(`Menyalin catatan: ${srcNote.title || 'Tanpa judul'}`);
                        }
                    }
                }
            });
        
            saveDataToLocalStorage();
            showToast(`${successCount} item berhasil diletakkan.`);
            notebookClipboard.action = null;
            notebookClipboard.items = [];
            document.getElementById('notebook-global-clipboard-dock')?.remove();
            
            renderNotebookNotes(destId);
            if (destId) {
                const destFolder = state.folders.find(f => f.id === destId);
                if (destFolder) renderNotebookNotes(destFolder.parentId);
            }
            sourceFolderIds.forEach(srcId => {
                const sId = srcId === 'root' ? null : srcId;
                if (sId !== destId) {
                    renderNotebookNotes(sId);
                    if (sId) {
                        const srcFolder = state.folders.find(f => f.id === sId);
                        if (srcFolder) renderNotebookNotes(srcFolder.parentId);
                    }
                }
            });
        }
        
        // --- MANAJEMEN SELEKSI EDITING / DELETE ---
        function handleRenameAction(currentFolderCtx) {
            if (selectedItems.length !== 1) return;
            const target = selectedItems[0];
            if (target.type === 'folder') {
                promptRenameFolder(target.id);
            } else {
                const note = state.notes.find(n => n.id === target.id);
                if (note) {
                    // Implementasi Kustom Pop-up Tengah Layar menggantikan prompt()
                    showNotebookInputDialog("Ubah Judul Catatan", "Masukkan judul baru...", note.title, (newTitle) => {
                        if (newTitle !== null) {
                            const oldTitle = note.title || 'Tanpa judul';
                            note.title = newTitle.trim();
                            note.lastEdit = getPrecisionDateTime(); 
                            logAction(`Mengubah judul catatan dari "${oldTitle}" menjadi "${note.title}"`);
                            saveDataToLocalStorage();
                            showToast("Judul diperbarui.");
                            renderNotebookNotes(currentFolderCtx ? currentFolderCtx : null);
                        }
                    });
                }
            }
            exitSelectionMode(currentFolderCtx);
        }
        
        function extractFolderBundleContents(folderId, outFolders, outNotes) {
            const subFolders = state.folders.filter(f => f.parentId === folderId);
            subFolders.forEach(sf => {
                outFolders.push(sf);
                extractFolderBundleContents(sf.id, outFolders, outNotes);
            });
            const subNotes = state.notes.filter(n => n.folderId === folderId);
            subNotes.forEach(sn => outNotes.push(sn));
        }

        function handleDeleteSelected(currentFolderCtx) {
            requestConfirm("Hapus Item", `Hapus ${selectedItems.length} item terpilih ke sampah?`, () => {
                selectedItems.forEach(item => {
                    if (item.type === 'folder') {
                        const mainFolder = state.folders.find(f => f.id === item.id);
                        if (mainFolder) {
                            let bundledFolders = [mainFolder];
                            let bundledNotes = [];
                            
                            extractFolderBundleContents(item.id, bundledFolders, bundledNotes);
                            
                            state.trash.push({
                                id: 'trash-' + Date.now() + Math.random().toString(36).substr(2, 4),
                                type: 'folder_bundle',
                                refId: item.id,
                                name: mainFolder.name,
                                deletedAt: new Date().toISOString(),
                                payload: JSON.stringify({ folders: bundledFolders, notes: bundledNotes }),
                                accountId: state.activeAccountId
                            });

                            logAction(`Menghapus paket folder ke sampah: ${mainFolder.name}`);

                            const bundledFolderIds = bundledFolders.map(f => f.id);
                            const bundledNoteIds = bundledNotes.map(n => n.id);
                            
                            state.folders = state.folders.filter(f => !bundledFolderIds.includes(f.id));
                            state.notes = state.notes.filter(n => !bundledNoteIds.includes(n.id));
                        }
                    } else {
                        const n = state.notes.find(x => x.id === item.id);
                        if (n) {
                            state.trash.push({ id: 'trash-' + Date.now(), type: 'note', refId: item.id, name: n.title || 'Catatan', deletedAt: new Date().toISOString(), payload: JSON.stringify(n), accountId: state.activeAccountId });
                            logAction(`Menghapus catatan ke sampah: ${n.title || 'Tanpa judul'}`);
                            state.notes = state.notes.filter(x => x.id !== item.id);
                        }
                    }
                });
                
                saveDataToLocalStorage();
                showToast("Berhasil dipindahkan ke sampah.");
                
                // --- PERBAIKAN BUG DI SINI ---
                // Reset mode seleksi terlebih dahulu sebelum memicu re-render / pembaruan UI direktori
                notebookSelectionMode = false;
                selectedItems = [];
                window.onpopstate = null;
                
                const currentId = currentFolderCtx ? currentFolderCtx : null;
                const ctxId = currentFolderCtx || 'root';
                
                // Pastikan tombol floating menu muncul kembali dan action bar disembunyikan
                document.getElementById(`notebook-floating-menu-group-${ctxId}`)?.classList.remove('hidden');
                
                renderNotebookNotes(currentId);
                if (currentId) {
                    const parentFolder = state.folders.find(f => f.id === currentId);
                    if (parentFolder) renderNotebookNotes(parentFolder.parentId);
                }
            });
        }
        
        // --- UTALITAS UTAMA Pembuat FOLDER & CATATAN ---
        function promptCreateFolder(currentFolderId = '') {
            // Implementasi Kustom Pop-up Tengah Layar menggantikan prompt()
            showNotebookInputDialog("Folder Baru", "Masukkan nama folder...", "", (name) => {
                if (!name) return;
                if(!state.folders) state.folders = [];
                state.folders.push({ id: 'folder-' + Date.now(), name: name, accountId: state.activeAccountId, parentId: currentFolderId || null });
                
                logAction(`Membuat folder baru: ${name}`);
                saveDataToLocalStorage(); 
                showToast("Folder dibuat."); 
                
                const ctxId = currentFolderId ? currentFolderId : null;
                renderNotebookNotes(ctxId);
                if (ctxId) {
                    const currentFolder = state.folders.find(f => f.id === ctxId);
                    if (currentFolder) renderNotebookNotes(currentFolder.parentId);
                }
            });
        }
        
        function promptRenameFolder(folderId) {
            const folder = state.folders.find(f => f.id === folderId);
            if (!folder) return;

            // Implementasi Kustom Pop-up Tengah Layar menggantikan prompt()
            showNotebookInputDialog("Ubah Nama Folder", "Masukkan nama baru...", folder.name, (newName) => {
                if (!newName || newName === folder.name) return;
                const oldName = folder.name;
                folder.name = newName; 
                
                logAction(`Mengubah nama folder dari "${oldName}" menjadi "${folder.name}"`);
                saveDataToLocalStorage(); 
                showToast("Nama folder diubah."); 
                renderNotebookNotes(folderId);
            });
        }
        
        function openNoteEditor(noteId = null, defaultFolderId = '') {
            const note = noteId ? state.notes.find(n => n.id === noteId) : null;
            const titleVal = note ? note.title : "";
            const contentVal = note ? note.content : "";
            const activeFolderId = note ? (note.folderId || "") : (defaultFolderId || "");
            
            let dateInfoText = "Catatan Baru";
            if (note) {
                const created = note.date || "Tidak diketahui";
                const edited = note.lastEdit || created;
                dateInfoText = `Dibuat: ${created} • Diedit: ${edited}`;
            }
            
            openFullOverlay(() => {
                return `
                    <div class="flex flex-col h-full min-h-[85vh] p-4 bg-white dark:bg-slate-950">
                        <input type="hidden" id="editor-note-folder" value="${activeFolderId}">
                        <input type="text" id="editor-note-title" value="${titleVal.replace(/"/g, '&quot;')}" placeholder="Judul" class="w-full bg-transparent border-none text-lg font-bold focus:ring-0 focus:outline-none placeholder:text-slate-400 text-slate-800 dark:text-slate-100 p-0 mb-4 mt-2">
                        <textarea id="editor-note-content" placeholder="Ketik catatan..." class="w-full flex-1 bg-transparent border-none text-sm focus:ring-0 focus:outline-none resize-none placeholder:text-slate-400 text-slate-700 dark:text-slate-300 p-0 leading-relaxed">${contentVal}</textarea>
                        <div class="flex items-center justify-between pt-3 pb-2 mt-auto shrink-0">
                            <span class="text-[9px] text-slate-400 font-medium">${dateInfoText}</span>
                            <div class="flex gap-1">
                                ${note ? `<button onclick="deleteNotebookNote('${noteId}', '${defaultFolderId}')" class="p-2 text-slate-400 hover:text-red-500 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"><i data-lucide="trash" class="w-5 h-5"></i></button>` : ''}
                                <button onclick="saveNoteAndClose('${noteId || ''}', '${defaultFolderId}')" class="p-2 text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/40 hover:bg-indigo-100 dark:hover:bg-indigo-900/60 rounded-full transition-colors"><i data-lucide="check" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }, noteId ? "Edit Catatan" : "Buat Catatan");
        }
        
        function saveNoteAndClose(noteId, contextFolderId) {
            const title = document.getElementById('editor-note-title').value.trim();
            const content = document.getElementById('editor-note-content').value.trim();
            const folderId = document.getElementById('editor-note-folder').value || null;
            const currentTimestamp = getPrecisionDateTime();

            if (!title && !content) { if(noteId) showToast("Catatan tidak boleh kosong."); else popNav(); return; }
            if (noteId) {
                const n = state.notes.find(x => x.id === noteId);
                if (n) { 
                    n.title = title; 
                    n.content = content; 
                    n.folderId = folderId; 
                    n.lastEdit = currentTimestamp; 
                    logAction(`Mengedit isi catatan: ${n.title || 'Tanpa judul'}`);
                    saveDataToLocalStorage(); 
                    showToast("Diperbarui."); 
                }
            } else {
                state.notes.push({ 
                    id: 'note-' + Date.now(), 
                    title: title,

        function handleDenomChange(val, count) {
            // Bersihkan spasi atau karakter tidak valid jika ada
            let cleanCount = String(count).replace(/[^0-9]/g, '');
            
            if (cleanCount === "" || parseInt(cleanCount) < 0) {
                delete denominationCounts[val]; 
            } else {
                denominationCounts[val] = cleanCount;
            }
            
            const cStr = denominationCounts[val]; 
            const sub = cStr ? (val * parseInt(cStr)) : 0;
            
            const subEl = document.getElementById(`denom-sub-${val}`);
            if (subEl) subEl.textContent = sub > 0 ? formatRupiah(sub) : '-';
            
            let grand = 0; 
            for(let key in denominationCounts) {
                grand += (parseInt(key) * parseInt(denominationCounts[key]));
            }
            
            const grandEl = document.getElementById('denom-grand');
            if (grandEl) grandEl.textContent = formatRupiah(grand);
        }

            const amount = parseFloat(rawAmtStr); 
            const dateVal = document.getElementById('tx-date').value; 
            const timeVal = document.getElementById('tx-time').value;

            const desc = document.getElementById('tx-desc').value.trim();
            
            // Validasi diperketat untuk memastikan kategori tidak boleh kosong ("Pilih Kategori")
            if (isNaN(amount) || amount <= 0 || !dateVal || !timeVal || !categoryId || !sourceId) { showToast("Data tidak valid/lengkap. Pastikan kategori sudah dipilih."); return; }
            
            // Menggabungkan Input menjadi Date Object (Zona Waktu Aman)

        // FUNGSI BARU: Mengunduh data dari Google Drive ke Perangkat Baru
        async function unduhDataDariAwan() {
            if (!googleAccessToken) return;
            try {
                const response = await gapi.client.drive.files.list({
                    spaces: 'appDataFolder',
                    fields: 'files(id, name)',
                    pageSize: 1
                });
                const files = response.result.files;
                if (files.length > 0) {
                    const fileId = files[0].id;
                    // Ambil konten file json dari Google Drive
                    const resData = await gapi.client.drive.files.get({
                        fileId: fileId,
                        alt: 'media'
                    });
                    
                    if (resData.result) {
                        // Bandingkan atau langsung timpa localStorage jika data cloud lebih baru/ada
                        localStorage.setItem('fintrace_state', JSON.stringify(resData.result));
                        // Muat ulang data ke aplikasi internal Anda
                        if (typeof loadDataFromLocalStorage === 'function') {
                            loadDataFromLocalStorage();
                            if (typeof updateHeaderDetails === 'function') updateHeaderDetails();
                        }
                        showToast("Data dari cloud berhasil dimuat ke perangkat ini!");
                    }
                } else {
                    // Jika file di cloud belum ada, lakukan upload pertama kali
                    jalankanSinkronisasiAwan();
                }
            } catch (err) {
                console.error("Gagal mengunduh data cloud:", err);
            }
        }

        async function jalankanSinkronisasiAwan() {
            if (!googleAccessToken) return;
            try {
                const response = await gapi.client.drive.files.list({
                    spaces: 'appDataFolder',
                    fields: 'files(id, name)',
                    pageSize: 1
                });
        
                const files = response.result.files;
                const backupData = localStorage.getItem('fintrace_state');
        
                const metadata = { name: 'fintrace_backup.json', parents: ['appDataFolder'] };
                const file = new Blob([backupData], { type: 'application/json' });
                const formData = new FormData();
                formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                formData.append('file', file);

                if (files.length > 0) {
                    const fileId = files[0].id;
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
                        method: 'PATCH',
                        headers: new Headers({ 'Authorization': 'Bearer ' + googleAccessToken }),
                        body: formData
                    });
                } else {
                    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                        method: 'POST',
                        headers: new Headers({ 'Authorization': 'Bearer ' + googleAccessToken }),
                        body: formData
                    });
                }
                showToast("Data aman tersinkronisasi!");
                const now = new Date();
                if (window.state && state.actionLogs) {
                    state.actionLogs.unshift({ 
                        id: 'log-' + Date.now(), 
                        action: "Sinkronisasi otomatis ke Google Cloud berhasil.", 
                        timestamp: now.toISOString(), 
                        accountId: state.activeAccountId 
                    });
                }
                if (typeof originalSaveData === 'function') originalSaveData(); 
            } catch (err) {
                console.error(err);
                showToast("Gagal sinkronisasi data cloud.");
            }
        }

                saveDataToLocalStorage();
                
                showTutorialModal("Selamat Datang di FinTrace!", "Aplikasi saat ini hanya memiliki satu akun bernama 'Utama'. Anda bisa mengubah nama akun ini atau menambah akun lain sesuai kebutuhan (misal: Akun Bisnis, Akun Rumah Tangga).<br><br><b>Caranya:</b> Masuk ke menu peralihan akun.", "user", `
                    <button onclick="closeTutorialModal(); openAccountSwitcher();" class="w-full py-2.5 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow-sm">Buka Menu Akun</button>
                    <button onclick="closeTutorialModal();" class="w-full py-2.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200">Abaikan</button>
                `);
            } else if (state.budgets.length === 0 && !state.settings.ignoreBudgetPrompt && hasIncomeCat && hasExpenseCat && hasActiveSource) {
                setTimeout(() => {
                    // Cek jika tidak ada pop-up / overlay lain yang sedang terbuka
                    if (navigationStack.length === 0 && !activeTutorialModal) {
                        showTutorialModal("Atur Anggaran Anda", "Anda belum memiliki anggaran bulan ini. Pengelola Anggaran membantu mengawasi batasan pengeluaran agar keuangan tetap terkendali.<br><br><b>Caranya:</b> Masuk ke menu 'Kelola' lalu pilih 'Pengelola Anggaran'.", "calculator", `
                            <button onclick="closeTutorialModal(); switchTab('manage'); setTimeout(()=>openBudgetManager(), 100);" class="w-full py-2.5 bg-indigo-600 text-white text-xs font-bold rounded-lg shadow-sm">Buka Pengelola Anggaran</button>
                            <button onclick="closeTutorialModal();" class="w-full py-2.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200">Abaikan Untuk Saat Ini</button>
                            <button onclick="closeTutorialModal(); ignoreBudgetForever();" class="w-full py-2.5 bg-red-50 text-red-600 text-xs font-bold rounded-lg hover:bg-red-100">Abaikan Selamanya</button>
                        `);
                    }
                }, 1000);
            }
            if (typeof gapi !== 'undefined' && typeof google !== 'undefined') {
                initGoogleAPI();
            }
        };

    </script>
